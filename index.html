<html lang="en">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Action Items — Domestic Tuning</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── Scrollbars ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }
  * { scrollbar-width: thin; scrollbar-color: #2a2a2a transparent; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222;
    --border: #2a2a2a;
    --border2: #333;
    --text: #e8e8e8;
    --text2: #888;
    --text3: #555;
    --red: #E24B4A;
    --red-bg: #1f1010;
    --red-border: #3a1515;
    --green: #1D9E75;
    --green-bg: #0a1f18;
    --green-border: #0f3028;
    --amber: #d4820a;
    --amber-bg: #1a1400;
    --blue: #4a9eff;
    --blue-bg: #0a1525;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: 'SF Mono', 'Fira Code', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo { font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: 0.02em; }
  .logo span { color: var(--red); }
  .sync-info { font-size: 11px; color: var(--text3); font-family: var(--mono); }
  .sync-info.error { color: var(--red); }
  .sync-info.ok { color: var(--green); }
  .btn-sync {
    font-size: 12px; padding: 5px 12px;
    background: transparent; color: var(--text2);
    border: 1px solid var(--border2); border-radius: 6px;
    cursor: pointer; font-family: var(--font);
    transition: all 0.15s;
  }
  .btn-sync:hover { border-color: var(--text3); color: var(--text); }
  /* ── Multiselect ── */
  .select-all-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; margin-bottom: 8px;
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 8px; cursor: pointer;
    transition: border-color 0.1s;
  }
  .select-all-bar:hover { border-color: var(--red); }
  .select-all-bar .check { flex-shrink: 0; }
  .select-all-label { font-size: 12px; color: var(--text2); user-select: none; }
  .inline-select-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .inline-select-count { font-size: 11px; color: var(--text3); font-family: var(--mono); }
  .inline-select-toggle {
    font-size: 11px; color: var(--text3); cursor: pointer;
    background: transparent; border: 1px solid var(--border2);
    border-radius: 5px; padding: 3px 10px; font-family: var(--font);
    transition: all 0.1s;
  }
  .inline-select-toggle:hover { color: var(--text); border-color: var(--text3); }
  .inline-select-toggle.active { color: var(--red); border-color: var(--red-border); background: var(--red-bg); }
  .item.selected { border-color: var(--red) !important; background: #1f1212; }
  .item.selected .check { border-color: var(--red); background: var(--red-bg); }
  .bulk-bar {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1e1e1e; border: 1px solid var(--border2);
    border-radius: 10px; padding: 10px 16px;
    display: flex; align-items: center; gap: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    z-index: 200; animation: slideUp 0.15s ease;
  }
  @keyframes slideUp { from { opacity:0; transform: translateX(-50%) translateY(8px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
  .bulk-count { font-size: 12px; color: var(--text2); font-family: var(--mono); padding-right: 6px; border-right: 1px solid var(--border2); }
  .bulk-btn {
    font-size: 12px; padding: 5px 12px; border-radius: 6px;
    cursor: pointer; font-family: var(--font); transition: all 0.15s;
    border: 1px solid var(--border2); background: transparent; color: var(--text);
  }
  .bulk-btn:hover { border-color: var(--text2); }
  .bulk-btn.danger { color: var(--red); border-color: var(--red-border); }
  .bulk-btn.danger:hover { background: var(--red-bg); }
  .bulk-btn.success { color: var(--green); border-color: var(--green-border); }
  .bulk-btn.success:hover { background: var(--green-bg); }
  .owner-picker {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: #1e1e1e; border: 1px solid var(--border2); border-radius: 8px;
    padding: 8px; z-index: 201; box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    display: flex; flex-direction: column; gap: 2px; min-width: 160px;
  }
  .owner-option {
    padding: 7px 12px; border-radius: 5px; cursor: pointer;
    font-size: 13px; color: var(--text); transition: background 0.1s;
  }
  .owner-option:hover { background: var(--surface2); }

  .btn-sync.syncing { color: var(--amber); border-color: var(--amber); }

  /* ── Layout ── */
  .shell { display: flex; height: calc(100vh - 49px); position: relative; }

  /* ── Sidebar ── */
  .sidebar {
    width: 220px;
    min-width: 160px;
    max-width: 400px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    padding: 16px 0 0;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .sidebar-nav { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; padding-bottom: 8px; }
  .sidebar-footer {
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--text3);
    font-family: var(--mono);
    flex-shrink: 0;
    margin-top: auto;
  }
  /* ── Resize handle ── */
  .resize-handle {
    width: 4px;
    cursor: col-resize;
    background: transparent;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .resize-handle:hover, .resize-handle.dragging { background: var(--red); }
  .nav-section { padding: 0 12px 4px; font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 8px; }
  .nav-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 16px; cursor: pointer; border-radius: 0;
    font-size: 13px; color: var(--text2);
    transition: all 0.1s; border-left: 2px solid transparent;
  }
  .nav-item:hover { background: var(--surface); color: var(--text); }
  .nav-item.active { background: var(--surface); color: var(--text); border-left-color: var(--red); }
  .nav-count { font-size: 11px; color: var(--text3); font-family: var(--mono); }
  .nav-item.active .nav-count { color: var(--red); }

  /* ── Main ── */
  .main { flex: 1; overflow-y: auto; padding: 20px 24px; }

  /* ── Stats ── */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; }
  .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .stat-value { font-size: 24px; font-weight: 600; color: var(--text); font-family: var(--mono); }
  .stat-value.red { color: var(--red); }
  .stat-value.green { color: var(--green); }
  .stat-value.amber { color: var(--amber); }

  /* ── Toolbar ── */
  .toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .toolbar select, .toolbar input {
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border2); border-radius: 6px;
    padding: 6px 10px; font-size: 12px; font-family: var(--font);
    outline: none; cursor: pointer;
  }
  .toolbar select:focus, .toolbar input:focus { border-color: var(--text3); }
  .toolbar input { width: 180px; }
  .toolbar input::placeholder { color: var(--text3); }

  /* ── Section label ── */
  .section-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text3); margin: 16px 0 8px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  /* ── Item cards ── */
  .item-list { display: flex; flex-direction: column; gap: 6px; }
  .item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px;
    display: flex; align-items: flex-start; gap: 10px;
    transition: border-color 0.1s, opacity 0.25s, transform 0.25s;
  }
  .item:hover { border-color: var(--border2); }
  .item.mine { border-left: 3px solid var(--red); }
  .item.likely { border-left: 3px solid var(--green); opacity: 0.8; }
  .item.done { opacity: 0.4; }

  .check {
    width: 16px; height: 16px; border: 1.5px solid var(--border2);
    border-radius: 3px; flex-shrink: 0; margin-top: 2px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.1s;
  }
  .check:hover { border-color: var(--green); }
  .check.done { background: var(--green); border-color: var(--green); }
  .check.done::after {
    content: ''; width: 8px; height: 5px;
    border-left: 2px solid #fff; border-bottom: 2px solid #fff;
    transform: rotate(-45deg) translateY(-1px); display: block;
  }
  .check.likely { background: var(--green-bg); border-color: var(--green); }
  .check.likely::after { content: '?'; font-size: 10px; color: var(--green); display: block; }

  .item-body { flex: 1; min-width: 0; }
  .item-text { font-size: 13px; color: var(--text); line-height: 1.5; }
  .item-text.done { text-decoration: line-through; color: var(--text3); }
  .item-meta { display: flex; gap: 6px; margin-top: 5px; flex-wrap: wrap; align-items: center; }

  .badge {
    font-size: 10px; padding: 2px 7px; border-radius: 99px;
    font-family: var(--mono); letter-spacing: 0.02em;
  }
  .b-me { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
  .b-other { background: var(--surface2); color: var(--text3); border: 1px solid var(--border); }
  .b-meeting { background: var(--blue-bg); color: var(--blue); border: 1px solid #0a2540; }
  .b-date { background: var(--surface2); color: #ccc; border: 1px solid #444; }
  .b-likely { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); cursor: pointer; }
  .b-dismiss { background: #1c1c1c; color: #bbb; border: 1px solid #444; cursor: pointer; }
  .b-dismiss:hover { border-color: #666; color: #e8e8e8; }
  .b-age { background: #1e1e1e; color: #bbb; border: 1px solid #444; font-family: var(--mono); }
  .b-age.stale { color: #e8a020; border-color: #4a3800; background: #221a00; }

  .auto-note { font-size: 11px; color: var(--text3); font-style: italic; }

  /* ── Meeting view ── */
  .meeting-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; margin-bottom: 8px; overflow: hidden;
  }
  .meeting-hdr {
    padding: 12px 16px; cursor: pointer; display: flex;
    align-items: center; justify-content: space-between;
    transition: background 0.1s;
  }
  .meeting-hdr:hover { background: var(--surface2); }
  .meeting-title { font-size: 14px; font-weight: 500; color: var(--text); }
  .meeting-sub { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: var(--mono); }
  .meeting-right { display: flex; align-items: center; gap: 10px; }
  .meeting-body { border-top: 1px solid var(--border); padding: 14px 16px; display: none; }
  .meeting-body.open { display: block; }
  .m-section { margin-bottom: 12px; }
  .m-section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 6px; }
  .m-summary { font-size: 13px; color: var(--text2); line-height: 1.6; }
  .m-decision { font-size: 13px; color: var(--text); padding: 5px 10px; background: var(--surface2); border-radius: 5px; margin-bottom: 4px; }
  .m-blocker { font-size: 13px; color: var(--amber); padding-left: 12px; position: relative; margin-bottom: 3px; line-height: 1.5; }
  .m-blocker::before { content: '⚠'; position: absolute; left: 0; font-size: 10px; top: 2px; }

  /* ── People view ── */
  .people-grid { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
  .person-row {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px;
    display: flex; align-items: center; justify-content: space-between;
    transition: opacity 0.2s;
  }
  .person-row.muted { opacity: 0.4; }
  .person-info { display: flex; align-items: center; gap: 10px; }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; flex-shrink: 0;
  }
  .person-name { font-size: 13px; color: var(--text); }
  .person-count { font-size: 11px; color: var(--text3); font-family: var(--mono); }
  .btn-mute {
    font-size: 11px; padding: 3px 10px; border-radius: 99px;
    background: transparent; color: var(--text3);
    border: 1px solid var(--border2); cursor: pointer; font-family: var(--font);
    transition: all 0.15s;
  }
  .btn-mute:hover { border-color: var(--red); color: var(--red); }
  .btn-mute.muted { background: var(--red-bg); color: var(--red); border-color: var(--red-border); }

  /* ── Empty / loading states ── */
  .empty { text-align: center; padding: 40px; color: var(--text3); font-size: 13px; }
  .loading { text-align: center; padding: 40px; color: var(--text3); font-size: 13px; font-family: var(--mono); }

  /* ── Spinner ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--border2); border-top-color: var(--amber); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }

  /* ── Kanban ── */
  .kanban-board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    align-items: start;
    padding-bottom: 40px;
  }
  .kanban-col {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    min-height: 200px;
  }
  .kanban-col-hdr {
    padding: 10px 14px 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .kanban-col-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .kanban-col-title.lane-new   { color: var(--text2); }
  .kanban-col-title.lane-now   { color: var(--red); }
  .kanban-col-title.lane-later { color: var(--blue); }
  .kanban-col-title.lane-never { color: var(--text3); }
  .kanban-col-count {
    font-size: 11px;
    color: var(--text3);
    font-family: var(--mono);
  }
  .kanban-cards {
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
  }
  .kanban-drop-zone {
    min-height: 60px;
    border-radius: 6px;
    transition: background 0.15s, border 0.15s;
    border: 2px dashed transparent;
  }
  .kanban-drop-zone.drag-over {
    background: var(--surface2);
    border-color: var(--border2);
  }
  .kanban-card {
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 7px;
    padding: 9px 11px;
    cursor: grab;
    transition: border-color 0.1s, opacity 0.1s, box-shadow 0.1s;
    user-select: none;
  }
  .kanban-card:hover { border-color: var(--border2); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
  .kanban-card.mine { border-left: 3px solid var(--red); }
  .kanban-card.dragging { opacity: 0.4; cursor: grabbing; }
  .kanban-card-text { font-size: 12px; color: var(--text); line-height: 1.5; margin-bottom: 6px; }
  .kanban-card-meta { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
  .kanban-never-toggle {
    width: 100%;
    background: transparent;
    border: none;
    padding: 8px 14px;
    font-size: 11px;
    color: var(--text3);
    cursor: pointer;
    text-align: left;
    font-family: var(--font);
    transition: color 0.1s;
  }
  .kanban-never-toggle:hover { color: var(--text2); }
  .kanban-col.never-col { opacity: 0.6; }
  .kanban-col.never-col.expanded { opacity: 1; }

  /* ── Kanban quick-add ── */
  .kanban-quick-add {
    padding: 8px;
    border-bottom: 1px solid var(--border);
  }
  .kanban-quick-add-form {
    display: flex; gap: 6px; align-items: flex-start;
  }
  .kanban-quick-add-input {
    flex: 1; background: var(--bg); border: 1px solid var(--border2);
    border-radius: 6px; color: var(--text); font-size: 12px;
    padding: 7px 10px; font-family: var(--font); resize: none;
    min-height: 32px; max-height: 80px; overflow-y: auto;
    transition: border-color 0.1s;
  }
  .kanban-quick-add-input:focus { outline: none; border-color: var(--text3); }
  .kanban-quick-add-input::placeholder { color: var(--text3); }
  .kanban-quick-add-btn {
    background: var(--red-bg); border: 1px solid var(--red-border);
    border-radius: 6px; color: var(--red); font-size: 12px;
    padding: 7px 12px; cursor: pointer; font-family: var(--font);
    white-space: nowrap; transition: all 0.1s; flex-shrink: 0;
  }
  .kanban-quick-add-btn:hover { background: var(--red); color: #fff; }

  .today-agenda {
    background: var(--bg); border: 1px solid var(--border);
    border-left: 3px solid var(--blue);
    border-radius: 6px; padding: 10px 13px;
    margin-bottom: 12px;
  }
  .today-agenda-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em;
    color: var(--blue); margin-bottom: 6px; font-weight: 600;
  }
  .today-agenda-text {
    font-size: 12px; color: var(--text2); line-height: 1.7;
    white-space: pre-wrap; word-break: break-word;
  }
  .today-agenda-item {
    display: flex; gap: 8px; align-items: flex-start;
    padding: 2px 0; font-size: 12px; color: var(--text2); line-height: 1.6;
  }
  .today-agenda-bullet { color: var(--blue); flex-shrink: 0; margin-top: 2px; }
  .today-memory {
    margin-top: 10px; padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .today-memory-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em;
    color: var(--text3); margin-bottom: 6px; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
  }
  .today-memory-label:hover { color: var(--text2); }
  .today-memory-items { display: flex; flex-direction: column; gap: 4px; }
  .today-memory-item {
    font-size: 12px; color: var(--text3); line-height: 1.5;
    padding: 5px 8px; border-radius: 5px; background: var(--bg);
    border: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-start;
  }
  .today-memory-item-check { color: var(--green); flex-shrink: 0; font-size: 11px; margin-top: 1px; }
  .today-memory-item-meta { font-size: 10px; color: var(--text3); margin-top: 2px; font-family: var(--mono); }
  .kmodal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 500;
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.12s ease;
  }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .kmodal {
    background: #141414;
    border: 1px solid var(--border2);
    border-radius: 12px;
    width: 620px;
    max-width: calc(100vw - 40px);
    max-height: calc(100vh - 60px);
    overflow-y: auto;
    animation: slideUp2 0.14s ease;
  }
  @keyframes slideUp2 { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .kmodal-hdr {

  .kanban-card-actions {

  .kc-btn {

  .kc-trash:hover { background: var(--red-bg);   border-color: var(--red);   color: var(--red);   }

  /* Lane pill for non-kanban views */

  .b-lane-later { background: var(--blue-bg); color: var(--blue); border: 1px solid #0a2540; }

  /* ── Today view ── */

  .today-sub { font-size: 12px; color: var(--text3); font-family: var(--mono); }

</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo">Domestic Tuning <span>//</span> Action Items</div>
    <div class="sync-info" id="sync-info">loading...</div>
  </div>
  <div style="display:flex;gap:8px;align-items:center"><button class="btn-sync" id="btn-sync" onclick="manualSync()">Sync now</button></div>
</header>

<div class="shell">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-nav">
      <div class="nav-section">Views</div>
      <div class="nav-item" data-view="today" onclick="switchView('today',this)">
        Today <span class="nav-count" id="nav-today">—</span>
      </div>
      <div class="nav-item active" data-view="mine" onclick="switchView('mine',this)">
        My items <span class="nav-count" id="nav-mine">—</span>
      </div>
      <div class="nav-item" data-view="all" onclick="switchView('all',this)">
        All open <span class="nav-count" id="nav-all">—</span>
      </div>
      <div class="nav-item" data-view="likely" onclick="switchView('likely',this)">
        Likely done <span class="nav-count" id="nav-likely">—</span>
      </div>
      <div class="nav-item" data-view="done" onclick="switchView('done',this)">
        Done <span class="nav-count" id="nav-done">—</span>
      </div>
      <div class="nav-item" data-view="trash" onclick="switchView('trash',this)">
        Trash <span class="nav-count" id="nav-trash">—</span>
      </div>

      <div class="nav-section" style="margin-top:16px">Tools</div>
      <div class="nav-item" data-view="meetings" onclick="switchView('meetings',this)">
        Meetings <span class="nav-count" id="nav-meetings">—</span>
      </div>
      <div class="nav-item" data-view="context" onclick="switchView('context',this)">
        Meeting context <span class="nav-count"></span>
      </div>
      <div class="nav-item" data-view="people" onclick="switchView('people',this)">
        People <span class="nav-count"></span>
      </div>
    </div>
    <div class="sidebar-footer">v1.9.3 · Jun 12, 2026 12:06 AM</div>
  </nav>
  <div class="resize-handle" id="resize-handle"></div>

  <main class="main" id="main-content">
    <div class="loading"><span class="spinner"></span>Loading action items...</div>
  </main>
</div>

<script>
const WORKER = 'https://action-items.zwhill.workers.dev';
const ME = 'Zach';
const S = {
  done: 'ai_done_v3',
  trash: 'ai_trash_v3',
  muted: 'ai_muted_v3',
  mutedMeetings: 'ai_muted_meetings_v3',
  likely: 'ai_likely_v3',
  dismissed: 'ai_dismissed_v3',
  expanded: 'ai_expanded_v3',
  lanes: 'ai_lanes_v1',
  laneOrder: 'ai_lane_order_v1',
  neverExpanded: 'ai_never_expanded_v1',
};

let allItems = [];
let calEvents = [];  // hoisted — used by renderToday and submitQuickAdd
let currentView = 'mine';
let currentMeetingFilter = null;
let searchVal = '';
let filterOwner = 'all';
let multiselect = false;
const selected = new Set();
let sortOrder = 'newest';
let allSummaries = [];
let todayWindow = 1; // days to show: 1=today only, 3=next 3 days

const done = new Set(JSON.parse(localStorage.getItem(S.done)||'[]'));
const trash = new Set(JSON.parse(localStorage.getItem(S.trash)||'[]'));
const muted = new Set(JSON.parse(localStorage.getItem(S.muted)||'[]'));
const mutedMeetings = new Set(JSON.parse(localStorage.getItem(S.mutedMeetings)||'[]'));
const likely = new Set(JSON.parse(localStorage.getItem(S.likely)||'[]'));
const dismissed = new Set(JSON.parse(localStorage.getItem(S.dismissed)||'[]'));
const expanded = new Set(JSON.parse(localStorage.getItem(S.expanded)||'[]'));

// Lanes: id -> 'new'|'now'|'later'|'never'  (localStorage is fallback cache; worker KV is source of truth)
let itemLanes = JSON.parse(localStorage.getItem(S.lanes)||'{}');
let laneOrder = JSON.parse(localStorage.getItem(S.laneOrder)||'{}'); // { laneKey: [id, id, ...] }
let neverExpanded = localStorage.getItem(S.neverExpanded) === 'true';

function save() {
  try {
    localStorage.setItem(S.done, JSON.stringify([...done]));
    localStorage.setItem(S.trash, JSON.stringify([...trash]));
    localStorage.setItem(S.muted, JSON.stringify([...muted]));
    localStorage.setItem(S.mutedMeetings, JSON.stringify([...mutedMeetings]));
    localStorage.setItem(S.likely, JSON.stringify([...likely]));
    localStorage.setItem(S.dismissed, JSON.stringify([...dismissed]));
    localStorage.setItem(S.expanded, JSON.stringify([...expanded]));
    localStorage.setItem(S.lanes, JSON.stringify(itemLanes));
    localStorage.setItem(S.laneOrder, JSON.stringify(laneOrder));
    localStorage.setItem(S.neverExpanded, String(neverExpanded));
  } catch(e) {}
}

async function setLane(id, lane) {
  // Update local state immediately
  if (lane === 'new') delete itemLanes[id];
  else itemLanes[id] = lane;
  save();
  render();
  // Persist to worker (fire and forget — localStorage is fallback if this fails)
  try {
    await fetch(`${WORKER}/lanes`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, lane }),
    });
  } catch(e) { /* silent — localStorage already saved */ }
}

// ── Data loading ──────────────────────────────────────────────────────────────

async function loadItems() {
  try {
    const [itemsRes, statusRes, summariesRes, lanesRes, calRes] = await Promise.all([
      fetch(`${WORKER}/items`),
      fetch(`${WORKER}/status`),
      fetch(`${WORKER}/summaries`),
      fetch(`${WORKER}/lanes`),
      fetch(`${WORKER}/calendar`),
    ]);
    allItems = await itemsRes.json();
    const status = await statusRes.json();
    allSummaries = await summariesRes.json();
    if (lanesRes.ok) {
      itemLanes = await lanesRes.json();
      save();
    }
    if (calRes.ok) {
      calEvents = await calRes.json();
    }

    // Run auto-resolve detection on loaded items
    detectAutoResolves();

    updateSyncInfo(status);
    buildMeetingNav();
    updateNavCounts();
    render();
  } catch(e) {
    document.getElementById('sync-info').textContent = 'connection error';
    document.getElementById('sync-info').className = 'sync-info error';
    document.getElementById('main-content').innerHTML = '<div class="empty">Could not reach action-items.zwhill.workers.dev</div>';
  }
}

// seenInMeetings: id -> number of distinct series sessions this item has survived open
const seenInMeetings = {};

function detectAutoResolves() {
  // Group items by meeting series + owner
  const bySeriesAndOwner = {};
  allItems.forEach(item => {
    const sk = seriesKey(item.meeting);
    const key = `${sk}::${item.owner}`;
    if (!bySeriesAndOwner[key]) bySeriesAndOwner[key] = [];
    bySeriesAndOwner[key].push(item);
  });

  // Collect all distinct session dates per series (across all owners)
  const allSeriesDates = {};
  Object.entries(bySeriesAndOwner).forEach(([key, group]) => {
    const sk = key.split('::')[0];
    if (!allSeriesDates[sk]) allSeriesDates[sk] = new Set();
    group.forEach(i => allSeriesDates[sk].add(i.meetingDate));
  });

  Object.entries(bySeriesAndOwner).forEach(([key, group]) => {
    const sk = key.split('::')[0];
    group.sort((a,b) => a.meetingDate.localeCompare(b.meetingDate));

    for (let i = 0; i < group.length; i++) {
      const older = group[i];
      if (done.has(older.id) || dismissed.has(older.id)) continue;

      // Carry-over count: how many series sessions happened AFTER this item's origin date
      const laterSessions = [...(allSeriesDates[sk]||[])].filter(d => d > older.meetingDate);
      seenInMeetings[older.id] = laterSessions.length; // 0 = first/only session, N = carried N times

      if (i < group.length - 1) {
        const newerItems = group.slice(i+1);
        const reRaised = newerItems.some(newer => {
          const ow = new Set(older.text.toLowerCase().split(/\s+/));
          const nw = new Set(newer.text.toLowerCase().split(/\s+/));
          const inter = [...ow].filter(w => nw.has(w)).length;
          return inter / Math.max(new Set([...ow,...nw]).size, 1) > 0.35;
        });
        if (!reRaised && !likely.has(older.id)) {
          likely.add(older.id);
        }
      }
    }
  });
  save();
}

function seriesKey(name) {
  if (!name) return '';
  let s = name.toLowerCase();
  // Specific content fixes
  s = s.replace(/\b20\+\s+ford\b/, '2020+ ford');
  // Normalize separators: & : _ / – — all become -
  s = s.replace(/[&:_\/\u2013\u2014]/g, '-');
  // Collapse whitespace around dashes
  s = s.replace(/\s*-+\s*/g, '-');
  // Strip noise suffixes in parens
  s = s.replace(/\s*\((recurring|test|tuning|check-in|checkin)\)\s*/gi, '');
  // Collapse multiple spaces/dashes
  s = s.replace(/\s+/g, ' ').replace(/-+/g, '-');
  // Trim dashes and spaces
  s = s.replace(/^[-\s]+|[-\s]+$/g, '');
  return s;
}

function updateSyncInfo(status) {
  const el = document.getElementById('sync-info');
  if (!status.lastSync) { el.textContent = 'never synced'; return; }
  const d = new Date(status.lastSync);
  const ago = Math.round((Date.now() - d) / 60000);
  const label = ago < 60 ? `${ago}m ago` : ago < 1440 ? `${Math.round(ago/60)}h ago` : `${Math.round(ago/1440)}d ago`;
  const newCount = status.newItems ?? status.totalItems;
  el.textContent = `synced ${label} · ${newCount > 0 ? '+' + newCount : newCount} items`;
  el.className = 'sync-info ok';
}

async function manualSync() {
  const btn = document.getElementById('btn-sync');
  btn.textContent = 'Syncing...';
  btn.className = 'btn-sync syncing';
  await loadItems();
  btn.textContent = 'Sync now';
  btn.className = 'btn-sync';
}

// ── Nav ───────────────────────────────────────────────────────────────────────

function buildMeetingNav() {
  // Sidebar meeting list removed — meetings are now a full view.
  // Just keep counts fresh for updateNavCounts.
  updateNavCounts();
}

function toggleMuteMeeting(sk) {
  if (mutedMeetings.has(sk)) mutedMeetings.delete(sk);
  else mutedMeetings.add(sk);
  save(); updateNavCounts();
  if (currentView === 'meetings') renderMeetings();
  else render();
}

function updateNavCounts() {
  const open = allItems.filter(i =>
    !done.has(i.id) && !dismissed.has(i.id) &&
    !mutedMeetings.has(seriesKey(i.meeting)) &&
    !(muted.has(i.owner) && i.owner !== ME)
  );
  const todayMine = open.filter(i => i.owner === ME && isTodayOrSoon(i.meetingDate, 1)).length;
  document.getElementById('nav-today').textContent = todayMine || '—';

  document.getElementById('nav-mine').textContent = allItems.filter(i =>
    i.owner === ME &&
    !done.has(i.id) &&
    !dismissed.has(i.id) &&
    !trash.has(i.id) &&
    !mutedMeetings.has(seriesKey(i.meeting))
  ).length || '—';

  document.getElementById('nav-all').textContent = open.length || '—';

  // Meetings — union of items, summaries, and calendar events (matches renderMeetings)
  const meetingsEl = document.getElementById('nav-meetings');
  if (meetingsEl) {
    const skSet = new Set();
    allItems.forEach(i => skSet.add(seriesKey(i.meeting)));
    allSummaries.forEach(s => skSet.add(seriesKey(s.seriesKey || s.meetingName || '')));
    calEvents.forEach(ev => { if (ev.subject) skSet.add(seriesKey(ev.subject)); });
    skSet.delete(''); // remove empty keys
    meetingsEl.textContent = skSet.size || '—';
  }

  document.getElementById('nav-likely').textContent = [...likely].filter(id => {
    const item = allItems.find(i => i.id === id);
    return !done.has(id) && !dismissed.has(id) && item && !mutedMeetings.has(seriesKey(item.meeting));
  }).length || '—';

  // Done — exclude trashed items
  document.getElementById('nav-done').textContent = [...done].filter(id => !trash.has(id)).length || '—';

  document.getElementById('nav-trash').textContent = trash.size || '—';
}

function isTodayOrSoon(dateStr, windowDays) {
  if (!dateStr) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr + 'T00:00:00');
  const diff = (d - today) / 86400000;
  return diff >= -1 && diff < windowDays; // include yesterday as grace
}

function switchView(view, el) {
  currentView = view;
  currentMeetingFilter = null;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  render();
}

function switchMeeting(meeting, el) {
  currentView = 'meeting';
  currentMeetingFilter = meeting;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (el) el.classList.add('active');
  render();
}

let _selectBarIds = [];

function inlineSelectBar(items) {
  _selectBarIds = items.map(i => i.id);
  const allSelected = items.length > 0 && items.every(i => selected.has(i.id));
  const nSelected = items.filter(i => selected.has(i.id)).length;
  const label = multiselect
    ? (allSelected ? 'Deselect all' : `Select all (${items.length})`)
    : 'Select';
  const countLabel = multiselect && nSelected > 0 ? `${nSelected} selected` : '';
  return `<div class="inline-select-bar">
    <span class="inline-select-count">${countLabel}</span>
    <button class="inline-select-toggle${multiselect?' active':''}" onclick="${multiselect ? 'selectAllVisible_items()' : 'toggleMultiselect(true)'}">${label}</button>
    ${multiselect ? `<button class="inline-select-toggle" style="margin-left:4px" onclick="toggleMultiselect(false)">Cancel</button>` : ''}
  </div>`;
}

function selectAllVisible_items() {
  const ids = _selectBarIds;
  const allSelected = ids.every(id => selected.has(id));
  if (allSelected) ids.forEach(id => selected.delete(id));
  else ids.forEach(id => selected.add(id));
  renderBulkBar();
  render();
}

function render() {
  const main = document.getElementById('main-content');

  if (currentView === 'context') { renderContext(); return; }
  if (currentView === 'people') { renderPeople(); return; }
  if (currentView === 'meetings') { renderMeetings(); return; }
  if (currentView === 'today') { renderToday(); return; }
  if (currentView === 'mine') { renderKanban(); return; }

  // Build toolbar
  const owners = [...new Set(allItems.map(i=>i.owner))].filter(o => o === ME || !muted.has(o)).sort();
  const toolbarHtml = `
    <div class="toolbar">
      <select id="f-owner" onchange="filterOwner=this.value;render()">
        <option value="all">All owners</option>
        ${owners.map(o=>`<option value="${o}"${filterOwner===o?' selected':''}>${o}</option>`).join('')}
      </select>
      <input type="text" id="f-search" placeholder="Search..." value="${searchVal}"
        oninput="searchVal=this.value;render()" />
      <select onchange="sortOrder=this.value;render()">
        <option value="newest"${sortOrder==='newest'?' selected':''}>Newest first</option>
        <option value="oldest"${sortOrder==='oldest'?' selected':''}>Oldest first</option>
      </select>
    </div>`;

  let items = getFilteredItems();

  if (currentView === 'trash') {
    const trashItems = allItems.filter(i => trash.has(i.id));
    const emptyBtn = trashItems.length ? `<button onclick="emptyTrash()" style="font-size:12px;padding:5px 14px;border-radius:6px;cursor:pointer;background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);font-family:var(--font);float:right">Empty trash</button>` : '';
    main.innerHTML = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <span style="font-size:12px;color:var(--text3)">Deleted items. Restore or empty permanently.</span>
      ${emptyBtn}
    </div>` + (trashItems.length
      ? `<div class="item-list">${trashItems.map(trashCard).join('')}</div>`
      : '<div class="empty">Trash is empty.</div>');
    document.querySelectorAll('[data-restore]').forEach(el => {
      el.addEventListener('click', () => { trash.delete(el.dataset.restore); save(); updateNavCounts(); render(); });
    });
    return;
  }

  if (currentView === 'done') {
    const doneItems = allItems.filter(i => done.has(i.id));
    main.innerHTML = toolbarHtml + inlineSelectBar(doneItems) + (doneItems.length
      ? `<div class="item-list">${doneItems.map(itemCard).join('')}</div>`
      : '<div class="empty">Nothing marked done yet.</div>');
    bindItemEvents();
    return;
  }

  if (currentView === 'likely') {
    const likelyItems = allItems.filter(i => likely.has(i.id) && !done.has(i.id) && !dismissed.has(i.id));
    main.innerHTML = `
      <div class="stats">
        <div class="stat"><div class="stat-label">Likely done</div><div class="stat-value amber">${likelyItems.length}</div></div>
      </div>
      ${toolbarHtml}
      ${inlineSelectBar(likelyItems)}
      ${likelyItems.length ? `<div class="item-list">${likelyItems.map(itemCard).join('')}</div>` : '<div class="empty">No items flagged as likely done.</div>'}`;
    bindItemEvents();
    return;
  }

  // Stats for main views
  const open = allItems.filter(i =>
    !done.has(i.id) && !dismissed.has(i.id) &&
    !mutedMeetings.has(seriesKey(i.meeting)) &&
    !(muted.has(i.owner) && i.owner !== ME)
  );
  const mine = open.filter(i => i.owner === ME);
  const statsHtml = `
    <div class="stats">
      <div class="stat"><div class="stat-label">Open</div><div class="stat-value">${open.length}</div></div>
      <div class="stat"><div class="stat-label">Yours</div><div class="stat-value red">${mine.length}</div></div>
      <div class="stat"><div class="stat-label">Likely done</div><div class="stat-value amber">${[...likely].filter(id=>!done.has(id)&&!dismissed.has(id)).length}</div></div>
      <div class="stat"><div class="stat-label">Confirmed done</div><div class="stat-value green">${done.size}</div></div>
    </div>`;

  if (!items.length) {
    main.innerHTML = statsHtml + toolbarHtml + '<div class="empty">No items match your filters.</div>';
    return;
  }

  // Group: yours first, then by owner
  let html = statsHtml + toolbarHtml + inlineSelectBar(items);
  const grouped = {};
  items.forEach(i => {
    if (!grouped[i.owner]) grouped[i.owner] = [];
    grouped[i.owner].push(i);
  });
  // Mine first
  if (grouped[ME]) {
    html += `<div class="section-label">Yours</div><div class="item-list">${grouped[ME].map(itemCard).join('')}</div>`;
    delete grouped[ME];
  }
  Object.entries(grouped).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([owner, ownerItems]) => {
    html += `<div class="section-label">${owner}</div><div class="item-list">${ownerItems.map(itemCard).join('')}</div>`;
  });

  main.innerHTML = html;
  bindItemEvents();
}

function getFilteredItems() {
  let items = allItems.filter(i => {
    if (done.has(i.id) || dismissed.has(i.id)) return false;
    if (muted.has(i.owner) && i.owner !== ME) return false;
    if (mutedMeetings.has(seriesKey(i.meeting))) return false;
    if (trash.has(i.id)) return false;
    if (filterOwner !== 'all' && i.owner !== filterOwner) return false;
    if (searchVal && !i.text.toLowerCase().includes(searchVal.toLowerCase()) && !i.owner.toLowerCase().includes(searchVal.toLowerCase())) return false;
    if (currentView === 'mine' && i.owner !== ME) return false;
    if (currentView === 'meeting' && i.meeting !== currentMeetingFilter) return false;
    return true;
  });
  items.sort((a, b) => {
    const da = a.meetingDate || '';
    const db = b.meetingDate || '';
    return sortOrder === 'oldest' ? da.localeCompare(db) : db.localeCompare(da);
  });
  return items;
}

function itemCard(i) {
  const isDone = done.has(i.id);
  const isLikely = likely.has(i.id) && !isDone;
  const isMe = i.owner === ME;
  const isSelected = selected.has(i.id);
  let cls = 'item';
  if (isMe && !isDone) cls += ' mine';
  if (isLikely) cls += ' likely';
  if (isDone) cls += ' done';
  if (isSelected) cls += ' selected';
  let checkCls = 'check';
  if (multiselect) {
    checkCls = isSelected ? 'check done' : 'check';
  } else {
    if (isDone) checkCls += ' done';
    else if (isLikely) checkCls += ' likely';
  }
  const dateLabel = i.meetingDate ? i.meetingDate.slice(5).replace('-','/') : '';
  // Lane pill (shown in non-kanban views)
  const lane = itemLanes[i.id] || 'new';
  const lanePill = (lane !== 'new' && currentView !== 'mine')
    ? `<span class="badge b-lane-${lane}">${lane}</span>`
    : '';
  // Age badge
  let ageBadge = '';
  if (i.meetingDate && !isDone) {
    const days = Math.floor((Date.now() - new Date(i.meetingDate)) / 86400000);
    if (days === 0) {
      ageBadge = `<span class="badge b-age" style="color:var(--green);border-color:var(--green-border);background:var(--green-bg)">today</span>`;
    } else if (days > 0) {
      const stale = days >= 14;
      ageBadge = `<span class="badge b-age${stale?' stale':''}" title="${days} days ago">${days}d</span>`;
    }
  }
  return `<div class="${cls}" ${multiselect ? `data-selectable="${i.id}"` : `data-openable="${i.id}"`}>
    <div class="${checkCls}" data-id="${i.id}" title="${multiselect ? (isSelected?'Deselect':'Select') : (isDone?'Reopen':'Mark done')}"></div>
    <div class="item-body">
      <div class="item-text${isDone?' done':''}">${escHtml(i.text)}</div>
      <div class="item-meta">
        <span class="badge ${isMe?'b-me':'b-other'}">${escHtml(i.owner)}</span>
        <span class="badge b-meeting">${escHtml(i.meeting.split(/\s+/).slice(0,4).join(' '))}</span>
        <span class="badge b-date">${dateLabel}</span>
        ${ageBadge}
        ${lanePill}
        ${isLikely && !multiselect ? `<span class="badge b-likely" data-confirm="${i.id}">✓ confirm done</span><span class="badge b-dismiss" data-dismiss="${i.id}">✕ keep open</span><span class="auto-note">${escHtml(i.autoResolveNote||'not re-raised')}</span>` : ''}
      </div>
    </div>
  </div>`;
}

// ── Kanban ────────────────────────────────────────────────────────────────────

function getLaneItems(myItems) {
  const laneItems = { new: [], now: [], later: [], never: [] };
  myItems.forEach(i => { const l = itemLanes[i.id] || 'new'; laneItems[l].push(i); });

  // Apply saved order within each lane, unknown items appended at end
  ['new','now','later','never'].forEach(lane => {
    const order = laneOrder[lane] || [];
    const orderMap = {};
    order.forEach((id, idx) => { orderMap[id] = idx; });
    laneItems[lane].sort((a, b) => {
      const ai = orderMap[a.id] ?? 99999;
      const bi = orderMap[b.id] ?? 99999;
      if (ai !== bi) return ai - bi;
      // No saved order — newest date first, then by createdAt for same-day
      const dateDiff = (b.meetingDate||'').localeCompare(a.meetingDate||'');
      if (dateDiff !== 0) return dateDiff;
      return (b.createdAt||'').localeCompare(a.createdAt||'');
    });
  });
  return laneItems;
}

function saveLaneOrder() {
  const lanes = ['new','now','later','never'];
  lanes.forEach(lane => {
    const cards = document.querySelectorAll(`.kanban-cards[data-drop="${lane}"] .kanban-card`);
    laneOrder[lane] = [...cards].map(c => c.dataset.id);
  });
  save();
}

function renderKanban() {
  const main = document.getElementById('main-content');
  const myItems = allItems.filter(i =>
    i.owner === ME && !done.has(i.id) && !dismissed.has(i.id) &&
    !trash.has(i.id) && !mutedMeetings.has(seriesKey(i.meeting))
  );

  const lanes = ['new', 'now', 'later', 'never'];
  const laneLabels = { new: 'New', now: 'Now', later: 'Later', never: 'Never' };
  const laneItems = getLaneItems(myItems);

  function kanbanCard(i) {
    const lane = itemLanes[i.id] || 'new';
    const dateLabel = i.meetingDate ? i.meetingDate.slice(5).replace('-','/') : '';
    let ageBadge = '';
    if (i.meetingDate) {
      const days = Math.floor((Date.now() - new Date(i.meetingDate)) / 86400000);
      if (days === 0) {
        ageBadge = `<span class="badge b-age" style="color:var(--green);border-color:var(--green-border);background:var(--green-bg)">today</span>`;
      } else if (days > 0) {
        const stale = days >= 14;
        ageBadge = `<span class="badge b-age${stale?' stale':''}">${days}d</span>`;
      }
    }
    return `<div class="kanban-card mine" draggable="true" data-id="${i.id}" data-lane="${lane}">
      <div class="kanban-card-text">${escHtml(i.text)}</div>
      <div class="kanban-card-meta">
        <span class="badge b-meeting">${escHtml(i.meeting.split(/\s+/).slice(0,4).join(' '))}</span>
        <span class="badge b-date">${dateLabel}</span>
        ${ageBadge}
        <div class="kanban-card-actions">
          <button class="kc-btn kc-done" data-kc-done="${i.id}" title="Mark complete">✓</button>
          <button class="kc-btn kc-trash" data-kc-trash="${i.id}" title="Delete">🗑</button>
        </div>
      </div>
    </div>`;
  }

  const colsHtml = lanes.map(lane => {
    const count = laneItems[lane].length;
    const isNever = lane === 'never';
    const showCards = !isNever || neverExpanded;
    const cardsHtml = laneItems[lane].map(kanbanCard).join('');
    const quickAdd = lane === 'new' ? `
      <div class="kanban-quick-add">
        <div class="kanban-quick-add-form">
          <textarea class="kanban-quick-add-input" id="kanban-quick-add-input" placeholder="Add a task..." rows="1"></textarea>
          <button class="kanban-quick-add-btn" id="kanban-quick-add-btn">+ Add</button>
        </div>
      </div>` : '';
    return `
      <div class="kanban-col${isNever?' never-col':''}${isNever&&neverExpanded?' expanded':''}" data-col="${lane}">
        <div class="kanban-col-hdr">
          <span class="kanban-col-title lane-${lane}">${laneLabels[lane]}</span>
          <span class="kanban-col-count">${count}</span>
        </div>
        ${quickAdd}
        ${isNever ? `<button class="kanban-never-toggle" onclick="neverExpanded=!neverExpanded;save();renderKanban()">${neverExpanded?'▲ Hide':'▼ Show'}</button>` : ''}
        ${showCards ? `<div class="kanban-cards kanban-drop-zone" data-drop="${lane}">${cardsHtml}</div>` : `<div class="kanban-drop-zone" data-drop="${lane}" style="min-height:40px;margin:6px 8px 8px;border-radius:6px;border:2px dashed var(--border)"></div>`}
      </div>`;
  }).join('');

  main.innerHTML = `<div class="kanban-board">${colsHtml}</div>`;
  bindKanbanEvents();
}

// ── Card modal ────────────────────────────────────────────────────────────────

// In-memory notes store (persisted to localStorage)
let cardNotes = JSON.parse(localStorage.getItem('ai_card_notes_v1') || '{}');
function saveNotes() { try { localStorage.setItem('ai_card_notes_v1', JSON.stringify(cardNotes)); } catch(e) {} }

function openCardModal(id) {
  const item = allItems.find(i => i.id === id);
  if (!item) return;

  const lane = itemLanes[id] || 'new';
  const dateLabel = item.meetingDate ? item.meetingDate.slice(5).replace('-','/') : '';
  const notes = cardNotes[id] || '';

  // Find matching summary — match on seriesKey or meeting name + date
  const sk = seriesKey(item.meeting);
  const summary = allSummaries.find(s =>
    s.meetingDate === item.meetingDate && (s.seriesKey === sk || s.meetingName === item.meeting)
  ) || allSummaries.find(s => s.seriesKey === sk);

  const briefHtml = summary
    ? `<div class="kmodal-brief">${escHtml(summary.summary)}</div>`
    : `<div class="kmodal-brief empty">No meeting brief available for this item.</div>`;

  const laneOptions = ['new','now','later','never'].map(l =>
    `<option value="${l}"${l===lane?' selected':''}>${l.charAt(0).toUpperCase()+l.slice(1)}</option>`
  ).join('');

  const overlay = document.createElement('div');
  overlay.className = 'kmodal-overlay';
  overlay.id = 'kmodal-overlay';
  overlay.innerHTML = `
    <div class="kmodal" id="kmodal">
      <div class="kmodal-hdr">
        <div class="kmodal-hdr-left">
          <select class="kmodal-lane-select" id="kmodal-lane">${laneOptions}</select>
          <span class="kmodal-meta">${escHtml(item.meeting)} · ${dateLabel}</span>
        </div>
        <button class="kmodal-close" id="kmodal-close">×</button>
      </div>
      <div class="kmodal-section">
        <div class="kmodal-label">Action item</div>
        <textarea class="kmodal-textarea" id="kmodal-text">${escHtml(item.text)}</textarea>
      </div>
      <div class="kmodal-section">
        <div class="kmodal-label">Notes</div>
        <textarea class="kmodal-textarea" id="kmodal-notes" placeholder="Add notes..." style="min-height:52px;">${escHtml(notes)}</textarea>
      </div>
      <div class="kmodal-section">
        <div class="kmodal-label">Meeting brief</div>
        ${briefHtml}
      </div>
      <div class="kmodal-footer">
        <div class="kmodal-footer-left">
          <button class="kmodal-btn" id="kmodal-up" title="Move up in lane">↑ Move up</button>
          <button class="kmodal-btn" id="kmodal-down" title="Move down in lane">↓ Move down</button>
        </div>
        <div class="kmodal-footer-right">
          <button class="kmodal-btn danger" id="kmodal-trash">🗑 Delete</button>
          <button class="kmodal-btn success" id="kmodal-done">✓ Mark complete</button>
        </div>
      </div>
    </div>`;

  document.body.appendChild(overlay);

  // Close handlers
  overlay.addEventListener('click', e => { if (e.target === overlay) closeCardModal(id); });
  document.getElementById('kmodal-close').addEventListener('click', () => closeCardModal(id));
  document.addEventListener('keydown', kmodalEsc);

  // Lane change
  document.getElementById('kmodal-lane').addEventListener('change', e => {
    setLane(id, e.target.value);
  });

  // Notes autosave
  document.getElementById('kmodal-notes').addEventListener('input', e => {
    cardNotes[id] = e.target.value;
    saveNotes();
  });

  // Move up/down
  document.getElementById('kmodal-up').addEventListener('click', () => moveCardInLane(id, -1));
  document.getElementById('kmodal-down').addEventListener('click', () => moveCardInLane(id, 1));

  // Complete
  document.getElementById('kmodal-done').addEventListener('click', () => {
    done.add(id);
    fetch(`${WORKER}/item/${encodeURIComponent(id)}/status`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ confirmedDone: true }),
    }).catch(() => {});
    save(); updateNavCounts();
    closeCardModal(id, true);
  });

  // Trash
  document.getElementById('kmodal-trash').addEventListener('click', () => {
    trash.add(id); save(); updateNavCounts();
    closeCardModal(id, true);
  });
}

function closeCardModal(id, rerender = true) {
  const overlay = document.getElementById('kmodal-overlay');
  if (overlay) overlay.remove();
  document.removeEventListener('keydown', kmodalEsc);
  if (rerender) render();
}

function kmodalEsc(e) { if (e.key === 'Escape') { const o = document.getElementById('kmodal-overlay'); if (o) o.remove(); document.removeEventListener('keydown', kmodalEsc); render(); } }

function moveCardInLane(id, dir) {
  const lane = itemLanes[id] || 'new';
  const order = laneOrder[lane] ? [...laneOrder[lane]] : [];
  // Ensure all current lane items are represented
  const cards = [...document.querySelectorAll(`.kanban-cards[data-drop="${lane}"] .kanban-card`)].map(c => c.dataset.id);
  const base = cards.length ? cards : order;
  const idx = base.indexOf(id);
  if (idx === -1) return;
  const newIdx = Math.max(0, Math.min(base.length - 1, idx + dir));
  const arr = [...base];
  arr.splice(idx, 1);
  arr.splice(newIdx, 0, id);
  laneOrder[lane] = arr;
  save();
  renderKanban();
}

function submitQuickAdd() {
  const input = document.getElementById('kanban-quick-add-input');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;

  // Detect currently active meeting from calendar
  const now = new Date();
  let meetingTag = 'Manual';
  if (calEvents.length) {
    const active = calEvents.find(ev => {
      if (!ev.start || !ev.end) return false;
      return now >= new Date(ev.start) && now <= new Date(ev.end);
    });
    if (active) meetingTag = active.subject || 'Manual';
  }

  const id = 'manual-' + Date.now() + '-' + Math.random().toString(36).slice(2, 7);
  const today = new Date().toISOString().slice(0, 10);
  const newItem = {
    id, text, owner: ME,
    meeting: meetingTag,
    meetingDate: today,
    status: 'open',
    confirmedDone: false,
    dismissed: false,
    createdAt: new Date().toISOString(),
    manual: true,
  };

  // Add to local state immediately
  allItems.push(newItem);
  save();
  updateNavCounts();

  // Persist to worker — /item endpoint requires no sync token
  fetch(`${WORKER}/item`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(newItem),
  }).catch(() => {
    // If worker fails, keep in localStorage as fallback
    try {
      const manuals = JSON.parse(localStorage.getItem('ai_manual_items_v1') || '[]');
      manuals.push(newItem);
      localStorage.setItem('ai_manual_items_v1', JSON.stringify(manuals));
    } catch(e) {}
  });

  input.value = '';
  input.style.height = 'auto';
  renderKanban();
}

function bindKanbanEvents() {
  // Quick-add
  const qaInput = document.getElementById('kanban-quick-add-input');
  const qaBtn = document.getElementById('kanban-quick-add-btn');
  if (qaInput && qaBtn) {
    // Auto-grow textarea
    qaInput.addEventListener('input', () => {
      qaInput.style.height = 'auto';
      qaInput.style.height = Math.min(qaInput.scrollHeight, 80) + 'px';
    });
    qaInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitQuickAdd(); }
    });
    qaBtn.addEventListener('click', submitQuickAdd);
  }

  let dragId = null;
  let dragLane = null;

  document.querySelectorAll('.kc-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = btn.dataset.kcDone || btn.dataset.kcTrash;
      if (btn.dataset.kcDone) {
        done.add(id);
        fetch(`${WORKER}/item/${encodeURIComponent(id)}/status`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ confirmedDone: true }),
        }).catch(() => {});
      } else {
        trash.add(id);
      }
      save(); updateNavCounts(); renderKanban();
    });
  });

  document.querySelectorAll('.kanban-card[draggable]').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('.kc-btn')) return;
      openCardModal(card.dataset.id);
    });
    card.addEventListener('dragstart', e => {
      dragId = card.dataset.id;
      dragLane = card.dataset.lane;
      setTimeout(() => card.classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => {
      document.querySelectorAll('.kanban-card.dragging').forEach(c => c.classList.remove('dragging'));
      document.querySelectorAll('.kanban-drop-zone').forEach(z => z.classList.remove('drag-over'));
      document.querySelectorAll('.drag-placeholder').forEach(p => p.remove());
      dragId = null; dragLane = null;
    });
  });

  document.querySelectorAll('.kanban-drop-zone').forEach(zone => {
    zone.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      document.querySelectorAll('.kanban-drop-zone').forEach(z => z.classList.remove('drag-over'));
      zone.classList.add('drag-over');

      // Show insertion placeholder within same-lane zone
      if (zone.dataset.drop === dragLane) {
        document.querySelectorAll('.drag-placeholder').forEach(p => p.remove());
        const afterEl = getDragAfterElement(zone, e.clientY);
        const ph = document.createElement('div');
        ph.className = 'drag-placeholder';
        ph.style.cssText = 'height:4px;background:var(--red);border-radius:2px;margin:2px 0;';
        if (afterEl) zone.insertBefore(ph, afterEl);
        else zone.appendChild(ph);
      }
    });
    zone.addEventListener('dragleave', e => {
      if (!zone.contains(e.relatedTarget)) {
        zone.classList.remove('drag-over');
        document.querySelectorAll('.drag-placeholder').forEach(p => p.remove());
      }
    });
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      document.querySelectorAll('.drag-placeholder').forEach(p => p.remove());
      const targetLane = zone.dataset.drop;
      if (!dragId || !targetLane) return;

      if (targetLane === dragLane) {
        // Same lane — reorder by inserting at drop position then reading DOM order
        const afterEl = getDragAfterElement(zone, e.clientY);
        const draggingCard = zone.querySelector(`[data-id="${dragId}"]`);
        if (draggingCard) {
          if (afterEl) zone.insertBefore(draggingCard, afterEl);
          else zone.appendChild(draggingCard);
        }
        // Capture new order from DOM
        const newOrder = [...zone.querySelectorAll('.kanban-card')].map(c => c.dataset.id);
        laneOrder[targetLane] = newOrder;
        save();
      } else {
        // Cross-lane — change lane, new item goes to bottom
        setLane(dragId, targetLane);
      }
    });
  });
}

function getDragAfterElement(container, y) {
  const draggables = [...container.querySelectorAll('.kanban-card:not(.dragging)')];
  return draggables.reduce((closest, child) => {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if (offset < 0 && offset > closest.offset) return { offset, element: child };
    return closest;
  }, { offset: Number.NEGATIVE_INFINITY }).element;
}

function bindItemEvents() {
  // Click item body to open modal
  document.querySelectorAll('[data-openable]').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.closest('.check') || e.target.closest('[data-confirm]') || e.target.closest('[data-dismiss]')) return;
      openCardModal(el.dataset.openable);
    });
  });
  document.querySelectorAll('.check[data-id]').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.id;
      if (multiselect) {
        if (selected.has(id)) selected.delete(id); else selected.add(id);
        renderBulkBar();
        render();
      } else {
        if (done.has(id)) done.delete(id); else { done.add(id); likely.delete(id); }
        save(); updateNavCounts(); render();
      }
    });
  });
  document.querySelectorAll('[data-confirm]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const id = el.dataset.confirm;
      const card = el.closest('.item');
      if (card) {
        card.style.transition = 'opacity 0.25s, transform 0.25s, max-height 0.3s 0.2s, margin 0.3s 0.2s, padding 0.3s 0.2s';
        card.style.opacity = '0';
        card.style.transform = 'translateX(18px)';
        setTimeout(() => {
          card.style.maxHeight = card.offsetHeight + 'px';
          card.style.overflow = 'hidden';
          requestAnimationFrame(() => {
            card.style.maxHeight = '0';
            card.style.marginBottom = '0';
            card.style.paddingTop = '0';
            card.style.paddingBottom = '0';
          });
          setTimeout(() => {
            card.remove();
            done.add(id); likely.delete(id); save(); updateNavCounts();
            // Update today badge if needed
            const todayEl = document.getElementById('nav-today');
            if (todayEl) {
              const open2 = allItems.filter(i => !done.has(i.id) && !dismissed.has(i.id) && !mutedMeetings.has(seriesKey(i.meeting)));
              todayEl.textContent = open2.filter(i => i.owner === ME && isTodayOrSoon(i.meetingDate, 1)).length || '—';
            }
          }, 320);
        }, 260);
      } else {
        done.add(id); likely.delete(id); save(); updateNavCounts(); render();
      }
    });
  });
  document.querySelectorAll('[data-dismiss]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const id = el.dataset.dismiss;
      const card = el.closest('.item');
      // "Keep open" — just remove from likely, do NOT dismiss the item
      likely.delete(id);
      save(); updateNavCounts();
      if (card) {
        card.style.transition = 'opacity 0.25s, transform 0.25s, max-height 0.3s 0.2s, margin 0.3s 0.2s, padding 0.3s 0.2s';
        card.style.opacity = '0';
        card.style.transform = 'translateX(-18px)';
        setTimeout(() => {
          card.style.maxHeight = card.offsetHeight + 'px';
          card.style.overflow = 'hidden';
          requestAnimationFrame(() => {
            card.style.maxHeight = '0';
            card.style.marginBottom = '0';
            card.style.paddingTop = '0';
            card.style.paddingBottom = '0';
          });
          setTimeout(() => { card.remove(); }, 320);
        }, 260);
      } else {
        render();
      }
    });
  });
}


// ── Today view ────────────────────────────────────────────────────────────────

async function renderToday() {
  const main = document.getElementById('main-content');
  main.innerHTML = '<div class="loading"><span class="spinner"></span>Loading calendar...</div>';

  // Use globally loaded calendar events, re-filter for today view
  let todayCalEvents = [...calEvents];

  // Filter out Viva/solo blocks
  const SKIP_KEYWORDS = ['lunch','breakfast','focus time','viva insights','summer hours','no meeting'];
  todayCalEvents = todayCalEvents.filter(ev => {
    const subj = (ev.subject||'').toLowerCase();
    if (SKIP_KEYWORDS.some(k => subj.includes(k))) return false;
    if (!ev.attendees || ev.attendees.length <= 1) return false;
    if (mutedMeetings.has(seriesKey(ev.subject||''))) return false;
    return true;
  });

  // Build date buckets
  const today = new Date(); today.setHours(0,0,0,0);
  const dateLabels = [];
  for (let i = 0; i < todayWindow; i++) {
    const d = new Date(today); d.setDate(today.getDate() + i);
    dateLabels.push(d.toISOString().slice(0,10));
  }

  // Group cal events by date
  const byDate = {};
  dateLabels.forEach(d => byDate[d] = []);
  todayCalEvents.forEach(ev => {
    const evDate = ev.start ? ev.start.slice(0,10) : null;
    if (evDate && byDate[evDate] !== undefined) byDate[evDate].push(ev);
  });

  // Build HTML
  const now = new Date();
  const todayStr = now.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });

  let html = `
    <div class="today-header">
      <div>
        <div class="today-date">${todayStr}</div>
        <div class="today-sub">${byDate[dateLabels[0]].length} meeting${byDate[dateLabels[0]].length!==1?'s':''} · ${allItems.filter(i=>i.owner===ME&&!done.has(i.id)&&!dismissed.has(i.id)&&i.meetingDate===dateLabels[0]).length} open items</div>
      </div>
      <div class="today-window">
        <button class="today-window-btn${todayWindow===1?' active':''}" onclick="todayWindow=1;renderToday()">Today</button>
        <button class="today-window-btn${todayWindow===3?' active':''}" onclick="todayWindow=3;renderToday()">3 days</button>
      </div>
    </div>`;

  dateLabels.forEach(dateStr => {
    const events = byDate[dateStr] || [];
    const d = new Date(dateStr + 'T00:00:00');
    const isToday = dateStr === today.toISOString().slice(0,10);
    const dayName = isToday ? 'Today' : d.toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' });

    // If multi-day view and no events for this day, skip
    if (todayWindow > 1 && events.length === 0) return;

    html += `<div class="day-group"><div class="day-label">${dayName}<span>${events.length} meeting${events.length!==1?'s':''}</span></div>`;

    if (events.length === 0) {
      html += `<div class="empty" style="padding:20px">No meetings scheduled.</div>`;
    } else {
      events.forEach(ev => {
        const sk = seriesKey(ev.subject || '');
        const evItems = allItems.filter(i =>
          !done.has(i.id) && !dismissed.has(i.id) &&
          seriesKey(i.meeting) === sk
        );
        const mineItems = evItems.filter(i => i.owner === ME);
        const otherItems = evItems.filter(i => i.owner !== ME);
        const summary = allSummaries.find(s => seriesKey(s.seriesKey || s.meetingName || '') === sk);
        const isExpanded = expanded.has('today::' + ev.id);
        const hasMine = mineItems.length > 0;
        const hasBody = ev.body && ev.body.trim().length > 0;
        const isEmpty = evItems.length === 0 && !summary && !hasBody;

        // Format time
        let timeStr = '';
        if (ev.start) {
          const t = new Date(ev.start);
          timeStr = t.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', hour12:true }).replace(' ','').toLowerCase();
        }

        html += `<div class="today-meeting${hasMine?' has-mine':''}${isEmpty?' empty-meeting':''}">
          <div class="today-meeting-hdr" data-today-meeting="${escAttr(ev.id||ev.subject)}">
            <span class="today-time">${timeStr}</span>
            <span class="today-meeting-name">${escHtml(ev.subject||'')}</span>
            <div class="today-meeting-meta">
              ${mineItems.length ? `<span class="badge b-me">${mineItems.length} mine</span>` : ''}
              ${otherItems.length ? `<span class="badge b-other">${otherItems.length} others</span>` : ''}
              ${!evItems.length && !summary && !hasBody ? `<span style="font-size:11px;color:var(--text3)">no notes</span>` : ''}
              <span style="color:var(--text3);font-size:12px">${isExpanded?'▲':'▼'}</span>
            </div>
          </div>
          <div class="today-meeting-body${isExpanded?' open':''}">`;

        // Agenda from invite body
        if (hasBody) {
          const bodyText = ev.body.trim();
          // Try to detect bullet/numbered list lines
          const lines = bodyText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
          const isList = lines.some(l => /^[-•*]|^\d+[.)]\s/.test(l));
          if (isList) {
            const itemsHtml = lines.map(l => {
              const clean = l.replace(/^[-•*]\s*|^\d+[.)]\s*/, '');
              return `<div class="today-agenda-item"><span class="today-agenda-bullet">›</span><span>${escHtml(clean)}</span></div>`;
            }).join('');
            html += `<div class="today-agenda"><div class="today-agenda-label">Agenda</div>${itemsHtml}</div>`;
          } else {
            html += `<div class="today-agenda"><div class="today-agenda-label">Agenda</div><div class="today-agenda-text">${escHtml(bodyText)}</div></div>`;
          }
        }

        // Summary — most recent
        if (summary) {
          html += `<div class="today-summary-label">Last session · ${summary.meetingDate}</div>
            <div class="today-summary">${escHtml(summary.summary)}</div>`;

          // Prior context — next 2 older summaries for this series
          const priorSummaries = allSummaries
            .filter(s => seriesKey(s.seriesKey || s.meetingName || '') === sk && s.meetingDate !== summary.meetingDate)
            .sort((a, b) => b.meetingDate.localeCompare(a.meetingDate))
            .slice(0, 2);

          if (priorSummaries.length > 0) {
            const priorKey = 'prior::' + ev.id;
            const priorExpanded = expanded.has(priorKey);
            html += `<div style="margin-top:6px">
              <div style="font-size:11px;color:var(--text3);cursor:pointer;display:inline-flex;align-items:center;gap:4px" data-mem-key="${escAttr(priorKey)}">
                ${priorExpanded ? '▲' : '▼'} <span>${priorExpanded ? 'Hide' : 'Show'} prior sessions (${priorSummaries.length})</span>
              </div>
              ${priorExpanded ? priorSummaries.map(s => `
                <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
                  <div class="today-summary-label">${s.meetingDate}</div>
                  <div class="today-summary" style="opacity:0.75">${escHtml(s.summary)}</div>
                </div>`).join('') : ''}
            </div>`;
          }
        } else {
          html += `<div class="today-no-summary">No prior meeting notes found.</div>`;
        }

        // Action items
        html += `<div class="today-items-label">Open action items (${evItems.length})</div>`;
        if (evItems.length === 0) {
          html += `<div class="today-empty-items">No open items for this meeting.</div>`;
        } else {
          html += `<div class="item-list">`;
          if (mineItems.length) {
            mineItems.forEach(i => { html += itemCard(i); });
          }
          if (otherItems.length) {
            otherItems.forEach(i => { html += itemCard(i); });
          }
          html += `</div>`;
        }

        // Completed memory — last 3 occurrences of this series, max 8 done items
        const doneMemory = allItems.filter(i =>
          done.has(i.id) &&
          seriesKey(i.meeting) === sk
        ).sort((a, b) => (b.meetingDate||'').localeCompare(a.meetingDate||''));

        if (doneMemory.length > 0) {
          // Get last 3 distinct meeting dates
          const recentDates = [...new Set(doneMemory.map(i => i.meetingDate))].slice(0, 3);
          const memItems = doneMemory.filter(i => recentDates.includes(i.meetingDate)).slice(0, 8);
          const memKey = 'mem::' + ev.id;
          const memExpanded = expanded.has(memKey);
          html += `<div class="today-memory">
            <div class="today-memory-label" data-mem-key="${escAttr(memKey)}">
              <span>${memExpanded ? '▲' : '▼'}</span>
              <span>Completed in prior sessions (${memItems.length})</span>
            </div>
            ${memExpanded ? `<div class="today-memory-items">${memItems.map(i => `
              <div class="today-memory-item">
                <span class="today-memory-item-check">✓</span>
                <div>
                  <div>${escHtml(i.text)}</div>
                  <div class="today-memory-item-meta">${i.owner} · ${i.meetingDate ? i.meetingDate.slice(5).replace('-','/') : ''}</div>
                </div>
              </div>`).join('')}</div>` : ''}
          </div>`;
        }

        html += `</div></div>`;
      });
    }

    html += `</div>`;
  });

  // No calendar events at all
  if (todayCalEvents.length === 0) {
    html += `<div class="empty">No meetings found — calendar may not be connected or no events today.</div>`;
  }

  main.innerHTML = html;
  bindItemEvents();

  // Bind expand/collapse
  document.querySelectorAll('.today-meeting-hdr[data-today-meeting]').forEach(el => {
    el.addEventListener('click', () => {
      const key = 'today::' + el.dataset.todayMeeting;
      if (expanded.has(key)) expanded.delete(key); else expanded.add(key);
      save(); renderToday();
    });
  });

  // Bind memory toggles
  document.querySelectorAll('[data-mem-key]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const key = el.dataset.memKey;
      if (expanded.has(key)) expanded.delete(key); else expanded.add(key);
      save(); renderToday();
    });
  });
}

// ── Meeting context view ──────────────────────────────────────────────────────

function renderContext() {
  const meetingGroups = {};
  allItems.forEach(i => {
    if (!meetingGroups[i.meeting]) meetingGroups[i.meeting] = { items: [], dates: [] };
    meetingGroups[i.meeting].items.push(i);
    if (!meetingGroups[i.meeting].dates.includes(i.meetingDate)) {
      meetingGroups[i.meeting].dates.push(i.meetingDate);
    }
  });

  const html = Object.entries(meetingGroups)
    .sort((a,b) => Math.max(...b[1].dates.map(d=>+new Date(d))) - Math.max(...a[1].dates.map(d=>+new Date(d))))
    .map(([meeting, data]) => {
      const open = data.items.filter(i => !done.has(i.id) && !dismissed.has(i.id));
      const isOpen = expanded.has(meeting);
      const lastDate = data.dates.sort().reverse()[0];
      return `<div class="meeting-card">
        <div class="meeting-hdr" data-meeting="${escAttr(meeting)}">
          <div>
            <div class="meeting-title">${escHtml(meeting)}</div>
            <div class="meeting-sub">${data.dates.length} session${data.dates.length!==1?'s':''} · last ${lastDate}</div>
          </div>
          <div class="meeting-right">
            <span class="badge b-meeting">${open.length} open</span>
            <span style="color:var(--text3);font-size:12px">${isOpen?'▲':'▼'}</span>
          </div>
        </div>
        <div class="meeting-body${isOpen?' open':''}">
          ${data.dates.sort().reverse().slice(0,3).map(date => {
            const sessionItems = data.items.filter(i => i.meetingDate === date);
            const openSession = sessionItems.filter(i => !done.has(i.id) && !dismissed.has(i.id));
            return `<div class="m-section">
              <div class="m-section-title">${date}</div>
              ${openSession.length ? openSession.map(i => `<div class="m-decision">${escHtml(i.owner)}: ${escHtml(i.text)}</div>`).join('') : '<div style="font-size:12px;color:var(--text3)">All items resolved</div>'}
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('');

  document.getElementById('main-content').innerHTML = html || '<div class="empty">No meeting data loaded.</div>';

  document.querySelectorAll('.meeting-hdr[data-meeting]').forEach(el => {
    el.addEventListener('click', () => {
      const m = el.dataset.meeting;
      if (expanded.has(m)) expanded.delete(m); else expanded.add(m);
      save(); renderContext();
    });
  });
}
