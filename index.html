<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Action Items — Domestic Tuning</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222;
    --border: #2a2a2a;
    --border2: #333;
    --text: #e8e8e8;
    --text2: #888;
    --text3: #555;
    --red: #E24B4A;
    --red-bg: #1f1010;
    --red-border: #3a1515;
    --green: #1D9E75;
    --green-bg: #0a1f18;
    --green-border: #0f3028;
    --amber: #d4820a;
    --amber-bg: #1a1400;
    --blue: #4a9eff;
    --blue-bg: #0a1525;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: 'SF Mono', 'Fira Code', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo { font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: 0.02em; }
  .logo span { color: var(--red); }
  .sync-info { font-size: 11px; color: var(--text3); font-family: var(--mono); }
  .sync-info.error { color: var(--red); }
  .sync-info.ok { color: var(--green); }
  .btn-sync {
    font-size: 12px; padding: 5px 12px;
    background: transparent; color: var(--text2);
    border: 1px solid var(--border2); border-radius: 6px;
    cursor: pointer; font-family: var(--font);
    transition: all 0.15s;
  }
  .btn-sync:hover { border-color: var(--text3); color: var(--text); }
  /* ── Multiselect ── */
  .select-all-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px; margin-bottom: 8px;
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 8px; cursor: pointer;
    transition: border-color 0.1s;
  }
  .select-all-bar:hover { border-color: var(--red); }
  .select-all-bar .check { flex-shrink: 0; }
  .select-all-label { font-size: 12px; color: var(--text2); user-select: none; }
  .btn-multiselect {
    font-size: 12px; padding: 5px 12px;
    background: transparent; color: var(--text2);
    border: 1px solid var(--border2); border-radius: 6px;
    cursor: pointer; font-family: var(--font);
    transition: all 0.15s;
  }
  .btn-multiselect:hover { border-color: var(--text3); color: var(--text); }
  .btn-multiselect.active { background: var(--red-bg); color: var(--red); border-color: var(--red-border); }
  .item.selected { border-color: var(--red) !important; background: #1f1212; }
  .item.selected .check { border-color: var(--red); background: var(--red-bg); }
  .bulk-bar {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1e1e1e; border: 1px solid var(--border2);
    border-radius: 10px; padding: 10px 16px;
    display: flex; align-items: center; gap: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    z-index: 200; animation: slideUp 0.15s ease;
  }
  @keyframes slideUp { from { opacity:0; transform: translateX(-50%) translateY(8px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }
  .bulk-count { font-size: 12px; color: var(--text2); font-family: var(--mono); padding-right: 6px; border-right: 1px solid var(--border2); }
  .bulk-btn {
    font-size: 12px; padding: 5px 12px; border-radius: 6px;
    cursor: pointer; font-family: var(--font); transition: all 0.15s;
    border: 1px solid var(--border2); background: transparent; color: var(--text);
  }
  .bulk-btn:hover { border-color: var(--text2); }
  .bulk-btn.danger { color: var(--red); border-color: var(--red-border); }
  .bulk-btn.danger:hover { background: var(--red-bg); }
  .bulk-btn.success { color: var(--green); border-color: var(--green-border); }
  .bulk-btn.success:hover { background: var(--green-bg); }
  .owner-picker {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: #1e1e1e; border: 1px solid var(--border2); border-radius: 8px;
    padding: 8px; z-index: 201; box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    display: flex; flex-direction: column; gap: 2px; min-width: 160px;
  }
  .owner-option {
    padding: 7px 12px; border-radius: 5px; cursor: pointer;
    font-size: 13px; color: var(--text); transition: background 0.1s;
  }
  .owner-option:hover { background: var(--surface2); }

  .btn-sync.syncing { color: var(--amber); border-color: var(--amber); }

  /* ── Layout ── */
  .shell { display: flex; height: calc(100vh - 49px); position: relative; }

  /* ── Sidebar ── */
  .sidebar {
    width: 220px;
    min-width: 160px;
    max-width: 400px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    padding: 16px 0 0;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .sidebar-nav { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; padding-bottom: 8px; }
  .sidebar-footer {
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--text3);
    font-family: var(--mono);
    flex-shrink: 0;
    margin-top: auto;
  }
  /* ── Resize handle ── */
  .resize-handle {
    width: 4px;
    cursor: col-resize;
    background: transparent;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .resize-handle:hover, .resize-handle.dragging { background: var(--red); }
  .nav-section { padding: 0 12px 4px; font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 8px; }
  .nav-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 16px; cursor: pointer; border-radius: 0;
    font-size: 13px; color: var(--text2);
    transition: all 0.1s; border-left: 2px solid transparent;
  }
  .nav-item:hover { background: var(--surface); color: var(--text); }
  .nav-item.active { background: var(--surface); color: var(--text); border-left-color: var(--red); }
  .nav-count { font-size: 11px; color: var(--text3); font-family: var(--mono); }
  .nav-item.active .nav-count { color: var(--red); }

  /* ── Main ── */
  .main { flex: 1; overflow-y: auto; padding: 20px 24px; }

  /* ── Stats ── */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; }
  .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .stat-value { font-size: 24px; font-weight: 600; color: var(--text); font-family: var(--mono); }
  .stat-value.red { color: var(--red); }
  .stat-value.green { color: var(--green); }
  .stat-value.amber { color: var(--amber); }

  /* ── Toolbar ── */
  .toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .toolbar select, .toolbar input {
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border2); border-radius: 6px;
    padding: 6px 10px; font-size: 12px; font-family: var(--font);
    outline: none; cursor: pointer;
  }
  .toolbar select:focus, .toolbar input:focus { border-color: var(--text3); }
  .toolbar input { width: 180px; }
  .toolbar input::placeholder { color: var(--text3); }

  /* ── Section label ── */
  .section-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text3); margin: 16px 0 8px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  /* ── Item cards ── */
  .item-list { display: flex; flex-direction: column; gap: 6px; }
  .item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px;
    display: flex; align-items: flex-start; gap: 10px;
    transition: border-color 0.1s;
  }
  .item:hover { border-color: var(--border2); }
  .item.mine { border-left: 3px solid var(--red); }
  .item.likely { border-left: 3px solid var(--green); opacity: 0.8; }
  .item.done { opacity: 0.4; }

  .check {
    width: 16px; height: 16px; border: 1.5px solid var(--border2);
    border-radius: 3px; flex-shrink: 0; margin-top: 2px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.1s;
  }
  .check:hover { border-color: var(--green); }
  .check.done { background: var(--green); border-color: var(--green); }
  .check.done::after {
    content: ''; width: 8px; height: 5px;
    border-left: 2px solid #fff; border-bottom: 2px solid #fff;
    transform: rotate(-45deg) translateY(-1px); display: block;
  }
  .check.likely { background: var(--green-bg); border-color: var(--green); }
  .check.likely::after { content: '?'; font-size: 10px; color: var(--green); display: block; }

  .item-body { flex: 1; min-width: 0; }
  .item-text { font-size: 13px; color: var(--text); line-height: 1.5; }
  .item-text.done { text-decoration: line-through; color: var(--text3); }
  .item-meta { display: flex; gap: 6px; margin-top: 5px; flex-wrap: wrap; align-items: center; }

  .badge {
    font-size: 10px; padding: 2px 7px; border-radius: 99px;
    font-family: var(--mono); letter-spacing: 0.02em;
  }
  .b-me { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
  .b-other { background: var(--surface2); color: var(--text3); border: 1px solid var(--border); }
  .b-meeting { background: var(--blue-bg); color: var(--blue); border: 1px solid #0a2540; }
  .b-date { background: var(--surface2); color: #aaa; border: 1px solid var(--border2); }
  .b-likely { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); cursor: pointer; }
  .b-dismiss { background: #1c1c1c; color: #bbb; border: 1px solid #444; cursor: pointer; }
  .b-dismiss:hover { border-color: #666; color: #e8e8e8; }
  .b-age { background: var(--surface2); color: #999; border: 1px solid #3a3a3a; font-family: var(--mono); }
  .b-age.stale { color: #c9930a; border-color: #3a2e00; background: #1a1500; }

  .auto-note { font-size: 11px; color: var(--text3); font-style: italic; }

  /* ── Meeting view ── */
  .meeting-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; margin-bottom: 8px; overflow: hidden;
  }
  .meeting-hdr {
    padding: 12px 16px; cursor: pointer; display: flex;
    align-items: center; justify-content: space-between;
    transition: background 0.1s;
  }
  .meeting-hdr:hover { background: var(--surface2); }
  .meeting-title { font-size: 14px; font-weight: 500; color: var(--text); }
  .meeting-sub { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: var(--mono); }
  .meeting-right { display: flex; align-items: center; gap: 10px; }
  .meeting-body { border-top: 1px solid var(--border); padding: 14px 16px; display: none; }
  .meeting-body.open { display: block; }
  .m-section { margin-bottom: 12px; }
  .m-section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 6px; }
  .m-summary { font-size: 13px; color: var(--text2); line-height: 1.6; }
  .m-decision { font-size: 13px; color: var(--text); padding: 5px 10px; background: var(--surface2); border-radius: 5px; margin-bottom: 4px; }
  .m-blocker { font-size: 13px; color: var(--amber); padding-left: 12px; position: relative; margin-bottom: 3px; line-height: 1.5; }
  .m-blocker::before { content: '⚠'; position: absolute; left: 0; font-size: 10px; top: 2px; }

  /* ── People view ── */
  .people-grid { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
  .person-row {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px;
    display: flex; align-items: center; justify-content: space-between;
    transition: opacity 0.2s;
  }
  .person-row.muted { opacity: 0.4; }
  .person-info { display: flex; align-items: center; gap: 10px; }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; flex-shrink: 0;
  }
  .person-name { font-size: 13px; color: var(--text); }
  .person-count { font-size: 11px; color: var(--text3); font-family: var(--mono); }
  .btn-mute {
    font-size: 11px; padding: 3px 10px; border-radius: 99px;
    background: transparent; color: var(--text3);
    border: 1px solid var(--border2); cursor: pointer; font-family: var(--font);
    transition: all 0.15s;
  }
  .btn-mute:hover { border-color: var(--red); color: var(--red); }
  .btn-mute.muted { background: var(--red-bg); color: var(--red); border-color: var(--red-border); }

  /* ── Empty / loading states ── */
  .empty { text-align: center; padding: 40px; color: var(--text3); font-size: 13px; }
  .loading { text-align: center; padding: 40px; color: var(--text3); font-size: 13px; font-family: var(--mono); }

  /* ── Spinner ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--border2); border-top-color: var(--amber); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }

  /* ── Kanban ── */
  .kanban-board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    align-items: start;
    padding-bottom: 40px;
  }
  .kanban-col {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    min-height: 200px;
  }
  .kanban-col-hdr {
    padding: 10px 14px 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .kanban-col-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .kanban-col-title.lane-new   { color: var(--text2); }
  .kanban-col-title.lane-now   { color: var(--red); }
  .kanban-col-title.lane-later { color: var(--blue); }
  .kanban-col-title.lane-never { color: var(--text3); }
  .kanban-col-count {
    font-size: 11px;
    color: var(--text3);
    font-family: var(--mono);
  }
  .kanban-cards {
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
  }
  .kanban-drop-zone {
    min-height: 60px;
    border-radius: 6px;
    transition: background 0.15s, border 0.15s;
    border: 2px dashed transparent;
  }
  .kanban-drop-zone.drag-over {
    background: var(--surface2);
    border-color: var(--border2);
  }
  .kanban-card {
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 7px;
    padding: 9px 11px;
    cursor: grab;
    transition: border-color 0.1s, opacity 0.1s, box-shadow 0.1s;
    user-select: none;
  }
  .kanban-card:hover { border-color: var(--border2); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
  .kanban-card.mine { border-left: 3px solid var(--red); }
  .kanban-card.dragging { opacity: 0.4; cursor: grabbing; }
  .kanban-card-text { font-size: 12px; color: var(--text); line-height: 1.5; margin-bottom: 6px; }
  .kanban-card-meta { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
  .kanban-never-toggle {
    width: 100%;
    background: transparent;
    border: none;
    padding: 8px 14px;
    font-size: 11px;
    color: var(--text3);
    cursor: pointer;
    text-align: left;
    font-family: var(--font);
    transition: color 0.1s;
  }
  .kanban-never-toggle:hover { color: var(--text2); }
  .kanban-col.never-col { opacity: 0.6; }
  .kanban-col.never-col.expanded { opacity: 1; }

  .kanban-card-actions {
    margin-left: auto;
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .kanban-card:hover .kanban-card-actions { opacity: 1; }
  .kc-btn {
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 5px;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 12px;
    transition: background 0.1s, border-color 0.1s;
    padding: 0;
    line-height: 1;
  }
  .kc-done  { color: var(--text3); }
  .kc-trash { color: var(--text3); }
  .kc-done:hover  { background: var(--green-bg); border-color: var(--green); color: var(--green); }
  .kc-trash:hover { background: var(--red-bg);   border-color: var(--red);   color: var(--red);   }

  /* Lane pill for non-kanban views */
  .b-lane-now   { background: var(--red-bg);  color: var(--red);  border: 1px solid var(--red-border); }
  .b-lane-later { background: var(--blue-bg); color: var(--blue); border: 1px solid #0a2540; }
  .b-lane-never { background: #111; color: var(--text3); border: 1px solid var(--border2); }

  /* ── Today view ── */
  .today-header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 20px;
  }
  .today-date { font-size: 20px; font-weight: 600; color: var(--text); }
  .today-sub { font-size: 12px; color: var(--text3); font-family: var(--mono); }
  .today-window {
    display: flex; gap: 6px; align-items: center;
  }
  .today-window-btn {
    font-size: 11px; padding: 3px 10px; border-radius: 99px;
    background: transparent; color: var(--text3);
    border: 1px solid var(--border2); cursor: pointer; font-family: var(--font);
    transition: all 0.15s;
  }
  .today-window-btn.active { background: var(--red-bg); color: var(--red); border-color: var(--red-border); }
  .today-window-btn:hover:not(.active) { border-color: var(--text3); color: var(--text); }

  .day-group { margin-bottom: 28px; }
  .day-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text3); margin-bottom: 10px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .day-label span { color: var(--text2); margin-left: 6px; font-size: 11px; text-transform: none; letter-spacing: 0; }

  .today-meeting {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; margin-bottom: 8px; overflow: hidden;
  }
  .today-meeting.has-mine { border-left: 3px solid var(--red); }
  .today-meeting.empty-meeting { opacity: 0.45; }

  .today-meeting-hdr {
    padding: 11px 14px; cursor: pointer; display: flex;
    align-items: center; gap: 12px;
    transition: background 0.1s;
  }
  .today-meeting-hdr:hover { background: var(--surface2); }

  .today-time {
    font-size: 11px; color: var(--text3); font-family: var(--mono);
    flex-shrink: 0; width: 52px;
  }
  .today-meeting-name { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; }
  .today-meeting-meta { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

  .today-meeting-body {
    border-top: 1px solid var(--border); padding: 12px 14px 14px;
    display: none;
  }
  .today-meeting-body.open { display: block; }

  .today-summary {
    font-size: 13px; color: var(--text2); line-height: 1.65;
    margin-bottom: 12px; padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .today-summary-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text3); margin-bottom: 5px;
  }
  .today-no-summary {
    font-size: 12px; color: var(--text3); font-style: italic; margin-bottom: 12px;
    padding-bottom: 12px; border-bottom: 1px solid var(--border);
  }
  .today-items-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text3); margin-bottom: 8px;
  }
  .today-empty-items {
    font-size: 12px; color: var(--text3); font-style: italic;
  }

</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo">Domestic Tuning <span>//</span> Action Items</div>
    <div class="sync-info" id="sync-info">loading...</div>
  </div>
  <div style="display:flex;gap:8px;align-items:center"><button class="btn-multiselect" id="btn-multiselect" onclick="toggleMultiselect()">Select</button><button class="btn-sync" id="btn-sync" onclick="manualSync()">Sync now</button></div>
</header>

<div class="shell">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-nav">
      <div class="nav-section">Views</div>
      <div class="nav-item" data-view="today" onclick="switchView('today',this)">
        Today <span class="nav-count" id="nav-today">—</span>
      </div>
      <div class="nav-item active" data-view="mine" onclick="switchView('mine',this)">
        My items <span class="nav-count" id="nav-mine">—</span>
      </div>
      <div class="nav-item" data-view="all" onclick="switchView('all',this)">
        All open <span class="nav-count" id="nav-all">—</span>
      </div>
      <div class="nav-item" data-view="likely" onclick="switchView('likely',this)">
        Likely done <span class="nav-count" id="nav-likely">—</span>
      </div>
      <div class="nav-item" data-view="done" onclick="switchView('done',this)">
        Done <span class="nav-count" id="nav-done">—</span>
      </div>
      <div class="nav-item" data-view="trash" onclick="switchView('trash',this)">
        Trash <span class="nav-count" id="nav-trash">—</span>
      </div>

      <div class="nav-section" style="margin-top:16px">Meetings</div>
      <div id="meeting-nav"></div>

      <div class="nav-section" style="margin-top:16px">Tools</div>
      <div class="nav-item" data-view="context" onclick="switchView('context',this)">
        Meeting context <span class="nav-count"></span>
      </div>
      <div class="nav-item" data-view="people" onclick="switchView('people',this)">
        People <span class="nav-count"></span>
      </div>
    </div>
    <div class="sidebar-footer">v1.6.3 · 11/06/2026</div>
  </nav>
  <div class="resize-handle" id="resize-handle"></div>

  <main class="main" id="main-content">
    <div class="loading"><span class="spinner"></span>Loading action items...</div>
  </main>
</div>

<script>
const WORKER = 'https://action-items.zwhill.workers.dev';
const ME = 'Zach';
const S = {
  done: 'ai_done_v3',
  trash: 'ai_trash_v3',
  muted: 'ai_muted_v3',
  mutedMeetings: 'ai_muted_meetings_v3',
  likely: 'ai_likely_v3',
  dismissed: 'ai_dismissed_v3',
  expanded: 'ai_expanded_v3',
  lanes: 'ai_lanes_v1',
  neverExpanded: 'ai_never_expanded_v1',
};

let allItems = [];
let currentView = 'mine';
let currentMeetingFilter = null;
let searchVal = '';
let filterOwner = 'all';
let multiselect = false;
const selected = new Set();
let sortOrder = 'newest';
let allSummaries = [];
let todayWindow = 1; // days to show: 1=today only, 3=next 3 days

const done = new Set(JSON.parse(localStorage.getItem(S.done)||'[]'));
const trash = new Set(JSON.parse(localStorage.getItem(S.trash)||'[]'));
const muted = new Set(JSON.parse(localStorage.getItem(S.muted)||'[]'));
const mutedMeetings = new Set(JSON.parse(localStorage.getItem(S.mutedMeetings)||'[]'));
const likely = new Set(JSON.parse(localStorage.getItem(S.likely)||'[]'));
const dismissed = new Set(JSON.parse(localStorage.getItem(S.dismissed)||'[]'));
const expanded = new Set(JSON.parse(localStorage.getItem(S.expanded)||'[]'));

// Lanes: id -> 'new'|'now'|'later'|'never'  (localStorage is fallback cache; worker KV is source of truth)
let itemLanes = JSON.parse(localStorage.getItem(S.lanes)||'{}');
let neverExpanded = localStorage.getItem(S.neverExpanded) === 'true';

function save() {
  try {
    localStorage.setItem(S.done, JSON.stringify([...done]));
    localStorage.setItem(S.trash, JSON.stringify([...trash]));
    localStorage.setItem(S.muted, JSON.stringify([...muted]));
    localStorage.setItem(S.mutedMeetings, JSON.stringify([...mutedMeetings]));
    localStorage.setItem(S.likely, JSON.stringify([...likely]));
    localStorage.setItem(S.dismissed, JSON.stringify([...dismissed]));
    localStorage.setItem(S.expanded, JSON.stringify([...expanded]));
    localStorage.setItem(S.lanes, JSON.stringify(itemLanes));
    localStorage.setItem(S.neverExpanded, String(neverExpanded));
  } catch(e) {}
}

async function setLane(id, lane) {
  // Update local state immediately
  if (lane === 'new') delete itemLanes[id];
  else itemLanes[id] = lane;
  save();
  render();
  // Persist to worker (fire and forget — localStorage is fallback if this fails)
  try {
    await fetch(`${WORKER}/lanes`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id, lane }),
    });
  } catch(e) { /* silent — localStorage already saved */ }
}

// ── Data loading ──────────────────────────────────────────────────────────────

async function loadItems() {
  try {
    const [itemsRes, statusRes, summariesRes, lanesRes] = await Promise.all([
      fetch(`${WORKER}/items`),
      fetch(`${WORKER}/status`),
      fetch(`${WORKER}/summaries`),
      fetch(`${WORKER}/lanes`),
    ]);
    allItems = await itemsRes.json();
    const status = await statusRes.json();
    allSummaries = await summariesRes.json();
    if (lanesRes.ok) {
      itemLanes = await lanesRes.json();
      save(); // cache to localStorage
    }

    // Run auto-resolve detection on loaded items
    detectAutoResolves();

    updateSyncInfo(status);
    buildMeetingNav();
    updateNavCounts();
    render();
  } catch(e) {
    document.getElementById('sync-info').textContent = 'connection error';
    document.getElementById('sync-info').className = 'sync-info error';
    document.getElementById('main-content').innerHTML = '<div class="empty">Could not reach action-items.zwhill.workers.dev</div>';
  }
}

// seenInMeetings: id -> number of distinct series sessions this item has survived open
const seenInMeetings = {};

function detectAutoResolves() {
  // Group items by meeting series + owner
  const bySeriesAndOwner = {};
  allItems.forEach(item => {
    const sk = seriesKey(item.meeting);
    const key = `${sk}::${item.owner}`;
    if (!bySeriesAndOwner[key]) bySeriesAndOwner[key] = [];
    bySeriesAndOwner[key].push(item);
  });

  // Collect all distinct session dates per series (across all owners)
  const allSeriesDates = {};
  Object.entries(bySeriesAndOwner).forEach(([key, group]) => {
    const sk = key.split('::')[0];
    if (!allSeriesDates[sk]) allSeriesDates[sk] = new Set();
    group.forEach(i => allSeriesDates[sk].add(i.meetingDate));
  });

  Object.entries(bySeriesAndOwner).forEach(([key, group]) => {
    const sk = key.split('::')[0];
    group.sort((a,b) => a.meetingDate.localeCompare(b.meetingDate));

    for (let i = 0; i < group.length; i++) {
      const older = group[i];
      if (done.has(older.id) || dismissed.has(older.id)) continue;

      // Carry-over count: how many series sessions happened AFTER this item's origin date
      const laterSessions = [...(allSeriesDates[sk]||[])].filter(d => d > older.meetingDate);
      seenInMeetings[older.id] = laterSessions.length; // 0 = first/only session, N = carried N times

      if (i < group.length - 1) {
        const newerItems = group.slice(i+1);
        const reRaised = newerItems.some(newer => {
          const ow = new Set(older.text.toLowerCase().split(/\s+/));
          const nw = new Set(newer.text.toLowerCase().split(/\s+/));
          const inter = [...ow].filter(w => nw.has(w)).length;
          return inter / Math.max(new Set([...ow,...nw]).size, 1) > 0.35;
        });
        if (!reRaised && !likely.has(older.id)) {
          likely.add(older.id);
        }
      }
    }
  });
  save();
}

function seriesKey(name) {
  return name.split(/\s+/).slice(0,3).join(' ').toLowerCase();
}

function updateSyncInfo(status) {
  const el = document.getElementById('sync-info');
  if (!status.lastSync) { el.textContent = 'never synced'; return; }
  const d = new Date(status.lastSync);
  const ago = Math.round((Date.now() - d) / 60000);
  const label = ago < 60 ? `${ago}m ago` : ago < 1440 ? `${Math.round(ago/60)}h ago` : `${Math.round(ago/1440)}d ago`;
  el.textContent = `synced ${label} · ${status.totalItems} items`;
  el.className = 'sync-info ok';
}

async function manualSync() {
  const btn = document.getElementById('btn-sync');
  btn.textContent = 'Syncing...';
  btn.className = 'btn-sync syncing';
  await loadItems();
  btn.textContent = 'Sync now';
  btn.className = 'btn-sync';
}

// ── Nav ───────────────────────────────────────────────────────────────────────

function buildMeetingNav() {
  const counts = {};
  allItems.forEach(i => {
    if (!done.has(i.id) && !dismissed.has(i.id)) {
      counts[i.meeting] = (counts[i.meeting]||0) + 1;
    }
  });
  // Include muted meetings so they can be unmuted
  mutedMeetings.forEach(sk => {
    const match = allItems.find(i => seriesKey(i.meeting) === sk);
    if (match && counts[match.meeting] === undefined) counts[match.meeting] = 0;
  });
  const meetings = Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0,12);
  const nav = document.getElementById('meeting-nav');
  nav.innerHTML = meetings.map(([name, count]) => {
    const sk = seriesKey(name);
    const isMuted = mutedMeetings.has(sk);
    const safeName = name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const safeSk = sk.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return '<div class="nav-item' + (isMuted ? ' muted-meeting' : '') + '" style="display:flex;align-items:center;justify-content:space-between;' + (isMuted ? 'opacity:0.45' : '') + '" data-view="meeting-' + escAttr(name) + '">'
      + '<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;flex:1;cursor:pointer"'
      + ' onclick="switchMeeting(\'' + safeName + '\',this.closest(\'.nav-item\'))">' + escHtml(name) + '</span>'
      + '<div style="display:flex;align-items:center;gap:4px;flex-shrink:0">'
      + (isMuted ? '<span class="nav-count" style="color:var(--text3)">muted</span>' : '<span class="nav-count">' + count + '</span>')
      + '<span style="font-size:11px;color:var(--text3);cursor:pointer;padding:2px 4px;border-radius:3px;transition:color 0.1s"'
      + ' title="' + (isMuted ? 'Unmute' : 'Mute') + '"'
      + ' onmouseenter="this.style.color=\'var(--red)\'" onmouseleave="this.style.color=\'var(--text3)\'"'
      + ' onclick="event.stopPropagation();toggleMuteMeeting(\'' + safeSk + '\')">'
      + (isMuted ? '🔇' : '🔕')
      + '</span></div></div>';
  }).join('');
}

function toggleMuteMeeting(sk) {
  if (mutedMeetings.has(sk)) mutedMeetings.delete(sk);
  else mutedMeetings.add(sk);
  save(); buildMeetingNav(); updateNavCounts(); render();
}

function updateNavCounts() {
  const open = allItems.filter(i =>
    !done.has(i.id) && !dismissed.has(i.id) &&
    !mutedMeetings.has(seriesKey(i.meeting)) &&
    !(muted.has(i.owner) && i.owner !== ME)
  );
  const todayMine = open.filter(i => i.owner === ME && isTodayOrSoon(i.meetingDate, 1)).length;
  document.getElementById('nav-today').textContent = todayMine || '—';
  document.getElementById('nav-mine').textContent = open.filter(i=>i.owner===ME).length;
  document.getElementById('nav-all').textContent = open.length;
  document.getElementById('nav-likely').textContent = [...likely].filter(id => {
    const item = allItems.find(i => i.id === id);
    return !done.has(id) && !dismissed.has(id) && item && !mutedMeetings.has(seriesKey(item.meeting));
  }).length;
  document.getElementById('nav-done').textContent = done.size;
  document.getElementById('nav-trash').textContent = trash.size || '—';
}

function isTodayOrSoon(dateStr, windowDays) {
  if (!dateStr) return false;
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr + 'T00:00:00');
  const diff = (d - today) / 86400000;
  return diff >= -1 && diff < windowDays; // include yesterday as grace
}

function switchView(view, el) {
  currentView = view;
  currentMeetingFilter = null;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  render();
}

function switchMeeting(meeting, el) {
  currentView = 'meeting';
  currentMeetingFilter = meeting;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  render();
}

// ── Render ────────────────────────────────────────────────────────────────────

function render() {
  const main = document.getElementById('main-content');

  if (currentView === 'context') { renderContext(); return; }
  if (currentView === 'people') { renderPeople(); return; }
  if (currentView === 'today') { renderToday(); return; }
  if (currentView === 'mine') { renderKanban(); return; }

  // Build toolbar
  const owners = [...new Set(allItems.map(i=>i.owner))].filter(o => o === ME || !muted.has(o)).sort();
  const toolbarHtml = `
    <div class="toolbar">
      <select id="f-owner" onchange="filterOwner=this.value;render()">
        <option value="all">All owners</option>
        ${owners.map(o=>`<option value="${o}"${filterOwner===o?' selected':''}>${o}</option>`).join('')}
      </select>
      <input type="text" id="f-search" placeholder="Search..." value="${searchVal}"
        oninput="searchVal=this.value;render()" />
      <select onchange="sortOrder=this.value;render()">
        <option value="newest"${sortOrder==='newest'?' selected':''}>Newest first</option>
        <option value="oldest"${sortOrder==='oldest'?' selected':''}>Oldest first</option>
      </select>
    </div>`;

  let items = getFilteredItems();

  if (currentView === 'trash') {
    const trashItems = allItems.filter(i => trash.has(i.id));
    const emptyBtn = trashItems.length ? `<button onclick="emptyTrash()" style="font-size:12px;padding:5px 14px;border-radius:6px;cursor:pointer;background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);font-family:var(--font);float:right">Empty trash</button>` : '';
    main.innerHTML = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <span style="font-size:12px;color:var(--text3)">Deleted items. Restore or empty permanently.</span>
      ${emptyBtn}
    </div>` + (trashItems.length
      ? `<div class="item-list">${trashItems.map(trashCard).join('')}</div>`
      : '<div class="empty">Trash is empty.</div>');
    document.querySelectorAll('[data-restore]').forEach(el => {
      el.addEventListener('click', () => { trash.delete(el.dataset.restore); save(); updateNavCounts(); render(); });
    });
    return;
  }

  if (currentView === 'done') {
    const doneItems = allItems.filter(i => done.has(i.id));
    main.innerHTML = toolbarHtml + (doneItems.length
      ? `<div class="item-list">${doneItems.map(itemCard).join('')}</div>`
      : '<div class="empty">Nothing marked done yet.</div>');
    bindItemEvents();
    return;
  }

  if (currentView === 'likely') {
    const likelyItems = allItems.filter(i => likely.has(i.id) && !done.has(i.id) && !dismissed.has(i.id));
    main.innerHTML = `
      <div class="stats">
        <div class="stat"><div class="stat-label">Likely done</div><div class="stat-value amber">${likelyItems.length}</div></div>
      </div>
      ${toolbarHtml}
      ${likelyItems.length ? `<div class="item-list">${likelyItems.map(itemCard).join('')}</div>` : '<div class="empty">No items flagged as likely done.</div>'}`;
    bindItemEvents();
    return;
  }

  // Stats for main views
  const open = allItems.filter(i =>
    !done.has(i.id) && !dismissed.has(i.id) &&
    !mutedMeetings.has(seriesKey(i.meeting)) &&
    !(muted.has(i.owner) && i.owner !== ME)
  );
  const mine = open.filter(i => i.owner === ME);
  const statsHtml = `
    <div class="stats">
      <div class="stat"><div class="stat-label">Open</div><div class="stat-value">${open.length}</div></div>
      <div class="stat"><div class="stat-label">Yours</div><div class="stat-value red">${mine.length}</div></div>
      <div class="stat"><div class="stat-label">Likely done</div><div class="stat-value amber">${[...likely].filter(id=>!done.has(id)&&!dismissed.has(id)).length}</div></div>
      <div class="stat"><div class="stat-label">Confirmed done</div><div class="stat-value green">${done.size}</div></div>
    </div>`;

  if (!items.length) {
    main.innerHTML = statsHtml + toolbarHtml + '<div class="empty">No items match your filters.</div>';
    return;
  }

  // Group: yours first, then by owner
  let html = statsHtml + toolbarHtml;

  const allSelectedAll = items.length > 0 && items.every(i => selected.has(i.id));
  if (multiselect) html += `<div class="select-all-bar" onclick="selectAllVisible()"><div class="check${allSelectedAll?' done':''}" style="pointer-events:none"></div><span class="select-all-label">${allSelectedAll ? 'Deselect all' : 'Select all'} (${items.length})</span></div>`;
  const grouped = {};
  items.forEach(i => {
    if (!grouped[i.owner]) grouped[i.owner] = [];
    grouped[i.owner].push(i);
  });
  // Mine first
  if (grouped[ME]) {
    html += `<div class="section-label">Yours</div><div class="item-list">${grouped[ME].map(itemCard).join('')}</div>`;
    delete grouped[ME];
  }
  Object.entries(grouped).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([owner, ownerItems]) => {
    html += `<div class="section-label">${owner}</div><div class="item-list">${ownerItems.map(itemCard).join('')}</div>`;
  });

  main.innerHTML = html;
  bindItemEvents();
}

function getFilteredItems() {
  let items = allItems.filter(i => {
    if (done.has(i.id) || dismissed.has(i.id)) return false;
    if (muted.has(i.owner) && i.owner !== ME) return false;
    if (mutedMeetings.has(seriesKey(i.meeting))) return false;
    if (trash.has(i.id)) return false;
    if (filterOwner !== 'all' && i.owner !== filterOwner) return false;
    if (searchVal && !i.text.toLowerCase().includes(searchVal.toLowerCase()) && !i.owner.toLowerCase().includes(searchVal.toLowerCase())) return false;
    if (currentView === 'mine' && i.owner !== ME) return false;
    if (currentView === 'meeting' && i.meeting !== currentMeetingFilter) return false;
    return true;
  });
  items.sort((a, b) => {
    const da = a.meetingDate || '';
    const db = b.meetingDate || '';
    return sortOrder === 'oldest' ? da.localeCompare(db) : db.localeCompare(da);
  });
  return items;
}

function itemCard(i) {
  const isDone = done.has(i.id);
  const isLikely = likely.has(i.id) && !isDone;
  const isMe = i.owner === ME;
  const isSelected = selected.has(i.id);
  let cls = 'item';
  if (isMe && !isDone) cls += ' mine';
  if (isLikely) cls += ' likely';
  if (isDone) cls += ' done';
  if (isSelected) cls += ' selected';
  let checkCls = 'check';
  if (multiselect) {
    checkCls = isSelected ? 'check done' : 'check';
  } else {
    if (isDone) checkCls += ' done';
    else if (isLikely) checkCls += ' likely';
  }
  const dateLabel = i.meetingDate ? i.meetingDate.slice(5).replace('-','/') : '';
  // Lane pill (shown in non-kanban views)
  const lane = itemLanes[i.id] || 'new';
  const lanePill = (lane !== 'new' && currentView !== 'mine')
    ? `<span class="badge b-lane-${lane}">${lane}</span>`
    : '';
  // Age badge
  let ageBadge = '';
  if (i.meetingDate && !isDone) {
    const days = Math.floor((Date.now() - new Date(i.meetingDate)) / 86400000);
    if (days >= 1) {
      const stale = days >= 14;
      ageBadge = `<span class="badge b-age${stale?' stale':''}" title="Created ${days} days ago">${days}d</span>`;
    }
  }
  return `<div class="${cls}" ${multiselect ? `data-selectable="${i.id}"` : ''}>
    <div class="${checkCls}" data-id="${i.id}" title="${multiselect ? (isSelected?'Deselect':'Select') : (isDone?'Reopen':'Mark done')}"></div>
    <div class="item-body">
      <div class="item-text${isDone?' done':''}">${escHtml(i.text)}</div>
      <div class="item-meta">
        <span class="badge ${isMe?'b-me':'b-other'}">${escHtml(i.owner)}</span>
        <span class="badge b-meeting">${escHtml(i.meeting.split(/\s+/).slice(0,4).join(' '))}</span>
        <span class="badge b-date">${dateLabel}</span>
        ${ageBadge}
        ${lanePill}
        ${isLikely && !multiselect ? `<span class="badge b-likely" data-confirm="${i.id}">✓ confirm done</span><span class="badge b-dismiss" data-dismiss="${i.id}">✕ keep open</span><span class="auto-note">${escHtml(i.autoResolveNote||'not re-raised')}</span>` : ''}
      </div>
    </div>
  </div>`;
}

// ── Kanban ────────────────────────────────────────────────────────────────────

function renderKanban() {
  const main = document.getElementById('main-content');
  const myItems = allItems.filter(i =>
    i.owner === ME &&
    !done.has(i.id) &&
    !dismissed.has(i.id) &&
    !trash.has(i.id) &&
    !mutedMeetings.has(seriesKey(i.meeting))
  );

  const lanes = ['new', 'now', 'later', 'never'];
  const laneLabels = { new: 'New', now: 'Now', later: 'Later', never: 'Never' };
  const laneItems = { new: [], now: [], later: [], never: [] };
  myItems.forEach(i => {
    const l = itemLanes[i.id] || 'new';
    laneItems[l].push(i);
  });
  // Sort each lane newest first
  lanes.forEach(l => laneItems[l].sort((a,b) => (b.meetingDate||'').localeCompare(a.meetingDate||'')));

  function kanbanCard(i) {
    const isMe = i.owner === ME;
    const lane = itemLanes[i.id] || 'new';
    const dateLabel = i.meetingDate ? i.meetingDate.slice(5).replace('-','/') : '';
    let ageBadge = '';
    if (i.meetingDate) {
      const days = Math.floor((Date.now() - new Date(i.meetingDate)) / 86400000);
      if (days >= 1) {
        const stale = days >= 14;
        ageBadge = `<span class="badge b-age${stale?' stale':''}">${days}d</span>`;
      }
    }
    return `<div class="kanban-card${isMe?' mine':''}" draggable="true" data-id="${i.id}" data-lane="${lane}">
      <div class="kanban-card-text">${escHtml(i.text)}</div>
      <div class="kanban-card-meta">
        <span class="badge b-meeting">${escHtml(i.meeting.split(/\s+/).slice(0,4).join(' '))}</span>
        <span class="badge b-date">${dateLabel}</span>
        ${ageBadge}
        <div class="kanban-card-actions">
          <button class="kc-btn kc-done" data-kc-done="${i.id}" title="Mark complete">✓</button>
          <button class="kc-btn kc-trash" data-kc-trash="${i.id}" title="Delete">🗑</button>
        </div>
      </div>
    </div>`;
  }

  const colsHtml = lanes.map(lane => {
    const count = laneItems[lane].length;
    const isNever = lane === 'never';
    const showCards = !isNever || neverExpanded;
    const cardsHtml = laneItems[lane].map(kanbanCard).join('');
    return `
      <div class="kanban-col${isNever?' never-col':''}${isNever&&neverExpanded?' expanded':''}" data-col="${lane}">
        <div class="kanban-col-hdr">
          <span class="kanban-col-title lane-${lane}">${laneLabels[lane]}</span>
          <span class="kanban-col-count">${count}</span>
        </div>
        ${isNever ? `<button class="kanban-never-toggle" onclick="neverExpanded=!neverExpanded;save();renderKanban()">${neverExpanded?'▲ Hide':'▼ Show'}</button>` : ''}
        ${showCards ? `<div class="kanban-cards kanban-drop-zone" data-drop="${lane}">${cardsHtml}</div>` : `<div class="kanban-drop-zone" data-drop="${lane}" style="min-height:40px;margin:6px 8px 8px;border-radius:6px;border:2px dashed var(--border)"></div>`}
      </div>`;
  }).join('');

  main.innerHTML = `<div class="kanban-board">${colsHtml}</div>`;

  bindKanbanEvents();
  bindItemEvents();
}

function bindKanbanEvents() {
  let dragId = null;

  document.querySelectorAll('.kc-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation(); // don't trigger drag
      const id = btn.dataset.kcDone || btn.dataset.kcTrash;
      if (btn.dataset.kcDone) {
        done.add(id);
        // Persist to worker
        fetch(`${WORKER}/item/${encodeURIComponent(id)}/status`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ confirmedDone: true }),
        }).catch(() => {});
      } else {
        trash.add(id);
      }
      save();
      updateNavCounts();
      renderKanban();
    });
  });

  document.querySelectorAll('.kanban-card[draggable]').forEach(card => {
    card.addEventListener('dragstart', e => {
      dragId = card.dataset.id;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      document.querySelectorAll('.kanban-drop-zone').forEach(z => z.classList.remove('drag-over'));
    });
  });

  document.querySelectorAll('.kanban-drop-zone').forEach(zone => {
    zone.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      document.querySelectorAll('.kanban-drop-zone').forEach(z => z.classList.remove('drag-over'));
      zone.classList.add('drag-over');
    });
    zone.addEventListener('dragleave', e => {
      if (!zone.contains(e.relatedTarget)) zone.classList.remove('drag-over');
    });
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      const targetLane = zone.dataset.drop;
      if (dragId && targetLane) {
        setLane(dragId, targetLane);
      }
      dragId = null;
    });
  });
}

function bindItemEvents() {
  document.querySelectorAll('.check[data-id]').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.id;
      if (multiselect) {
        if (selected.has(id)) selected.delete(id); else selected.add(id);
        renderBulkBar();
        render();
      } else {
        if (done.has(id)) done.delete(id); else { done.add(id); likely.delete(id); }
        save(); updateNavCounts(); render();
      }
    });
  });
  document.querySelectorAll('[data-confirm]').forEach(el => {
    el.addEventListener('click', e => { e.stopPropagation(); done.add(el.dataset.confirm); likely.delete(el.dataset.confirm); save(); updateNavCounts(); render(); });
  });
  document.querySelectorAll('[data-dismiss]').forEach(el => {
    el.addEventListener('click', e => { e.stopPropagation(); dismissed.add(el.dataset.dismiss); likely.delete(el.dataset.dismiss); save(); updateNavCounts(); render(); });
  });
}


// ── Today view ────────────────────────────────────────────────────────────────

async function renderToday() {
  const main = document.getElementById('main-content');
  main.innerHTML = '<div class="loading"><span class="spinner"></span>Loading calendar...</div>';

  // Fetch calendar events from Worker KV (populated by sync script)
  let calEvents = [];
  try {
    const res = await fetch(`${WORKER}/calendar`);
    if (res.ok) calEvents = await res.json();
  } catch(e) {
    // Calendar fetch failed — render with action items only
  }

  // Filter out Viva/solo blocks
  const SKIP_KEYWORDS = ['lunch','breakfast','focus time','viva insights','summer hours','no meeting'];
  calEvents = calEvents.filter(ev => {
    const subj = (ev.subject||'').toLowerCase();
    if (SKIP_KEYWORDS.some(k => subj.includes(k))) return false;
    if (!ev.attendees || ev.attendees.length <= 1) return false;
    return true;
  });

  // Build date buckets
  const today = new Date(); today.setHours(0,0,0,0);
  const dateLabels = [];
  for (let i = 0; i < todayWindow; i++) {
    const d = new Date(today); d.setDate(today.getDate() + i);
    dateLabels.push(d.toISOString().slice(0,10));
  }

  // Group cal events by date
  const byDate = {};
  dateLabels.forEach(d => byDate[d] = []);
  calEvents.forEach(ev => {
    const evDate = ev.start ? ev.start.slice(0,10) : null;
    if (evDate && byDate[evDate] !== undefined) byDate[evDate].push(ev);
  });

  // Build HTML
  const now = new Date();
  const todayStr = now.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });

  let html = `
    <div class="today-header">
      <div>
        <div class="today-date">${todayStr}</div>
        <div class="today-sub">${byDate[dateLabels[0]].length} meeting${byDate[dateLabels[0]].length!==1?'s':''} · ${allItems.filter(i=>i.owner===ME&&!done.has(i.id)&&!dismissed.has(i.id)&&i.meetingDate===dateLabels[0]).length} open items</div>
      </div>
      <div class="today-window">
        <button class="today-window-btn${todayWindow===1?' active':''}" onclick="todayWindow=1;renderToday()">Today</button>
        <button class="today-window-btn${todayWindow===3?' active':''}" onclick="todayWindow=3;renderToday()">3 days</button>
      </div>
    </div>`;

  dateLabels.forEach(dateStr => {
    const events = byDate[dateStr] || [];
    const d = new Date(dateStr + 'T00:00:00');
    const isToday = dateStr === today.toISOString().slice(0,10);
    const dayName = isToday ? 'Today' : d.toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' });

    // If multi-day view and no events for this day, skip
    if (todayWindow > 1 && events.length === 0) return;

    html += `<div class="day-group"><div class="day-label">${dayName}<span>${events.length} meeting${events.length!==1?'s':''}</span></div>`;

    if (events.length === 0) {
      html += `<div class="empty" style="padding:20px">No meetings scheduled.</div>`;
    } else {
      events.forEach(ev => {
        const sk = seriesKey(ev.subject || '');
        const evItems = allItems.filter(i =>
          !done.has(i.id) && !dismissed.has(i.id) &&
          seriesKey(i.meeting) === sk
        );
        const mineItems = evItems.filter(i => i.owner === ME);
        const otherItems = evItems.filter(i => i.owner !== ME);
        const summary = allSummaries.find(s => s.seriesKey === sk);
        const isExpanded = expanded.has('today::' + ev.id);
        const hasMine = mineItems.length > 0;
        const isEmpty = evItems.length === 0 && !summary;

        // Format time
        let timeStr = '';
        if (ev.start) {
          const t = new Date(ev.start);
          timeStr = t.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', hour12:true }).replace(' ','').toLowerCase();
        }

        html += `<div class="today-meeting${hasMine?' has-mine':''}${isEmpty?' empty-meeting':''}">
          <div class="today-meeting-hdr" data-today-meeting="${escAttr(ev.id||ev.subject)}">
            <span class="today-time">${timeStr}</span>
            <span class="today-meeting-name">${escHtml(ev.subject||'')}</span>
            <div class="today-meeting-meta">
              ${mineItems.length ? `<span class="badge b-me">${mineItems.length} mine</span>` : ''}
              ${otherItems.length ? `<span class="badge b-other">${otherItems.length} others</span>` : ''}
              ${!evItems.length && !summary ? `<span style="font-size:11px;color:var(--text3)">no notes</span>` : ''}
              <span style="color:var(--text3);font-size:12px">${isExpanded?'▲':'▼'}</span>
            </div>
          </div>
          <div class="today-meeting-body${isExpanded?' open':''}">`;

        // Summary
        if (summary) {
          html += `<div class="today-summary-label">Last session · ${summary.meetingDate}</div>
            <div class="today-summary">${escHtml(summary.summary)}</div>`;
        } else {
          html += `<div class="today-no-summary">No prior meeting notes found.</div>`;
        }

        // Action items
        html += `<div class="today-items-label">Open action items (${evItems.length})</div>`;
        if (evItems.length === 0) {
          html += `<div class="today-empty-items">No open items for this meeting.</div>`;
        } else {
          html += `<div class="item-list">`;
          if (mineItems.length) {
            mineItems.forEach(i => { html += itemCard(i); });
          }
          if (otherItems.length) {
            otherItems.forEach(i => { html += itemCard(i); });
          }
          html += `</div>`;
        }

        html += `</div></div>`;
      });
    }

    html += `</div>`;
  });

  // No calendar events at all
  if (calEvents.length === 0) {
    html += `<div class="empty">No meetings found — calendar may not be connected or no events today.</div>`;
  }

  main.innerHTML = html;
  bindItemEvents();

  // Bind expand/collapse
  document.querySelectorAll('.today-meeting-hdr[data-today-meeting]').forEach(el => {
    el.addEventListener('click', () => {
      const key = 'today::' + el.dataset.todayMeeting;
      if (expanded.has(key)) expanded.delete(key); else expanded.add(key);
      save(); renderToday();
    });
  });
}

// ── Meeting context view ──────────────────────────────────────────────────────

function renderContext() {
  const meetingGroups = {};
  allItems.forEach(i => {
    if (!meetingGroups[i.meeting]) meetingGroups[i.meeting] = { items: [], dates: [] };
    meetingGroups[i.meeting].items.push(i);
    if (!meetingGroups[i.meeting].dates.includes(i.meetingDate)) {
      meetingGroups[i.meeting].dates.push(i.meetingDate);
    }
  });

  const html = Object.entries(meetingGroups)
    .sort((a,b) => Math.max(...b[1].dates.map(d=>+new Date(d))) - Math.max(...a[1].dates.map(d=>+new Date(d))))
    .map(([meeting, data]) => {
      const open = data.items.filter(i => !done.has(i.id) && !dismissed.has(i.id));
      const isOpen = expanded.has(meeting);
      const lastDate = data.dates.sort().reverse()[0];
      return `<div class="meeting-card">
        <div class="meeting-hdr" data-meeting="${escAttr(meeting)}">
          <div>
            <div class="meeting-title">${escHtml(meeting)}</div>
            <div class="meeting-sub">${data.dates.length} session${data.dates.length!==1?'s':''} · last ${lastDate}</div>
          </div>
          <div class="meeting-right">
            <span class="badge b-meeting">${open.length} open</span>
            <span style="color:var(--text3);font-size:12px">${isOpen?'▲':'▼'}</span>
          </div>
        </div>
        <div class="meeting-body${isOpen?' open':''}">
          ${data.dates.sort().reverse().slice(0,3).map(date => {
            const sessionItems = data.items.filter(i => i.meetingDate === date);
            const openSession = sessionItems.filter(i => !done.has(i.id) && !dismissed.has(i.id));
            return `<div class="m-section">
              <div class="m-section-title">${date}</div>
              ${openSession.length ? openSession.map(i => `<div class="m-decision">${escHtml(i.owner)}: ${escHtml(i.text)}</div>`).join('') : '<div style="font-size:12px;color:var(--text3)">All items resolved</div>'}
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('');

  document.getElementById('main-content').innerHTML = html || '<div class="empty">No meeting data loaded.</div>';

  document.querySelectorAll('.meeting-hdr[data-meeting]').forEach(el => {
    el.addEventListener('click', () => {
      const m = el.dataset.meeting;
      if (expanded.has(m)) expanded.delete(m); else expanded.add(m);
      save(); renderContext();
    });
  });
}

// ── People view ───────────────────────────────────────────────────────────────


function trashCard(i) {
  return `<div class="item" style="opacity:0.6">
    <div class="item-body" style="padding-left:0">
      <div class="item-text done">${escHtml(i.text)}</div>
      <div class="item-meta">
        <span class="badge b-other">${escHtml(i.owner)}</span>
        <span class="badge b-meeting">${escHtml(i.meeting.split(/\s+/).slice(0,4).join(' '))}</span>
        <span class="badge b-date">${i.meetingDate ? i.meetingDate.slice(5).replace('-','/') : ''}</span>
        <button data-restore="${i.id}" style="font-size:11px;padding:2px 10px;border-radius:99px;cursor:pointer;background:transparent;color:var(--green);border:1px solid var(--green-border);font-family:var(--font);transition:all 0.15s">Restore</button>
      </div>
    </div>
  </div>`;
}

function renderPeople() {
  const counts = {};
  allItems.forEach(i => { counts[i.owner] = (counts[i.owner]||0)+1; });
  const avatarColors = ['#1a2540','#0a1f18','#1f1010','#1a1400','#1a0f2a','#0a1a25'];
  const textColors = ['#4a9eff','#1D9E75','#E24B4A','#d4820a','#9b6dff','#4adfff'];

  const html = Object.entries(counts)
    .sort((a,b) => b[1]-a[1])
    .map(([owner, count], idx) => {
      const isMuted = muted.has(owner);
      const isMe = owner === ME;
      const initials = owner.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
      const ci = idx % avatarColors.length;
      const openCount = allItems.filter(i => i.owner===owner && !done.has(i.id) && !dismissed.has(i.id)).length;
      return `<div class="person-row${isMuted?' muted':''}">
        <div class="person-info">
          <div class="avatar" style="background:${avatarColors[ci]};color:${textColors[ci]}">${initials}</div>
          <div>
            <div class="person-name">${escHtml(owner)}${isMe?' <span style="color:var(--text3);font-size:11px">(you)</span>':''}</div>
            <div class="person-count">${openCount} open · ${count} total</div>
          </div>
        </div>
        ${isMe
          ? '<span style="font-size:11px;color:var(--text3)">always shown</span>'
          : `<button class="btn-mute${isMuted?' muted':''}" data-owner="${escAttr(owner)}">${isMuted?'Unmute':'Mute'}</button>`}
      </div>`;
    }).join('');

  const allMuted = Object.keys(counts).filter(o => o !== ME).every(o => muted.has(o));
  document.getElementById('main-content').innerHTML = `
    <div style="margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;">
      <span style="font-size:12px;color:var(--text3)">Mute someone to hide their items from all views. Your items always show.</span>
      <button id="btn-mute-all" style="font-size:11px;padding:4px 12px;border-radius:6px;cursor:pointer;font-family:var(--font);transition:all 0.15s;background:${allMuted?'var(--red-bg)':'transparent'};color:${allMuted?'var(--red)':'var(--text3)'};border:1px solid ${allMuted?'var(--red-border)':'var(--border2)'};">
        ${allMuted ? 'Unmute all' : 'Mute all'}
      </button>
    </div>
    <div class="people-grid">${html}</div>`;

  document.querySelectorAll('.btn-mute').forEach(btn => {
    btn.addEventListener('click', () => {
      const o = btn.dataset.owner;
      if (muted.has(o)) muted.delete(o); else muted.add(o);
      save(); buildMeetingNav(); updateNavCounts(); renderPeople();
    });
  });

  document.getElementById('btn-mute-all')?.addEventListener('click', () => {
    const others = Object.keys(counts).filter(o => o !== ME);
    const allMuted = others.every(o => muted.has(o));
    if (allMuted) {
      if (!confirm('Unmute everyone?')) return;
      others.forEach(o => muted.delete(o));
    } else {
      if (!confirm(`Mute all ${others.length} people? Your items will still show.`)) return;
      others.forEach(o => muted.add(o));
    }
    save(); buildMeetingNav(); updateNavCounts(); renderPeople();
  });
}

// ── Utils ─────────────────────────────────────────────────────────────────────

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}


// ── Sidebar resize ────────────────────────────────────────────────────────────
(function() {
  const handle = document.getElementById('resize-handle');
  const sidebar = document.getElementById('sidebar');
  let dragging = false, startX = 0, startW = 0;
  handle.addEventListener('mousedown', e => {
    dragging = true;
    startX = e.clientX;
    startW = sidebar.offsetWidth;
    handle.classList.add('dragging');
    document.body.style.userSelect = 'none';
    document.body.style.cursor = 'col-resize';
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const w = Math.min(400, Math.max(160, startW + (e.clientX - startX)));
    sidebar.style.width = w + 'px';
  });
  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.userSelect = '';
    document.body.style.cursor = '';
  });
})();


// ── Multiselect ───────────────────────────────────────────────────────────────

function selectAllVisible() {
  const items = getFilteredItems();
  const allSelected = items.every(i => selected.has(i.id));
  if (allSelected) {
    items.forEach(i => selected.delete(i.id));
  } else {
    items.forEach(i => selected.add(i.id));
  }
  renderBulkBar();
  render();
}

function toggleMultiselect() {
  multiselect = !multiselect;
  selected.clear();
  const btn = document.getElementById('btn-multiselect');
  btn.classList.toggle('active', multiselect);
  btn.textContent = multiselect ? 'Cancel' : 'Select';
  renderBulkBar();
  render();
}

function renderBulkBar() {
  document.getElementById('bulk-bar')?.remove();
  document.getElementById('owner-picker')?.remove();
  if (!multiselect || selected.size === 0) return;
  const owners = [...new Set(allItems.map(i => i.owner))].sort();
  const bar = document.createElement('div');
  bar.className = 'bulk-bar'; bar.id = 'bulk-bar';
  bar.innerHTML = `
    <span class="bulk-count">${selected.size} selected</span>
    <button class="bulk-btn success" onclick="bulkDone()">✓ Mark done</button>
    <button class="bulk-btn" onclick="bulkDismiss()">✕ Dismiss</button>
    <button class="bulk-btn" onclick="bulkOwner()">↩ Change owner</button>
    <button class="bulk-btn danger" onclick="bulkDelete()">Delete</button>
  `;
  document.body.appendChild(bar);
}

function bulkDone() {
  selected.forEach(id => { done.add(id); likely.delete(id); dismissed.delete(id); });
  selected.clear(); save(); updateNavCounts(); renderBulkBar(); render();
}

function bulkDismiss() {
  selected.forEach(id => { dismissed.add(id); likely.delete(id); });
  selected.clear(); save(); updateNavCounts(); renderBulkBar(); render();
}

function bulkDelete() {
  selected.forEach(id => { trash.add(id); done.delete(id); dismissed.delete(id); likely.delete(id); });
  selected.clear(); save(); updateNavCounts(); renderBulkBar(); render();
}

function emptyTrash() {
  if (!confirm(`Permanently delete ${trash.size} item${trash.size!==1?'s':''}? This cannot be undone.`)) return;
  allItems = allItems.filter(i => !trash.has(i.id));
  trash.clear(); save(); updateNavCounts(); render();
}

function bulkOwner() {
  document.getElementById('owner-picker')?.remove();
  const owners = [...new Set(allItems.map(i => i.owner))].sort();
  const picker = document.createElement('div');
  picker.className = 'owner-picker'; picker.id = 'owner-picker';
  picker.innerHTML = owners.map(o =>
    `<div class="owner-option" onclick="bulkAssign('${o.replace(/'/g,"\'")}')">${o}</div>`
  ).join('');
  document.body.appendChild(picker);
  setTimeout(() => document.addEventListener('click', function h(e) {
    if (!picker.contains(e.target)) { picker.remove(); document.removeEventListener('click', h); }
  }), 0);
}

function bulkAssign(owner) {
  selected.forEach(id => {
    const item = allItems.find(i => i.id === id);
    if (item) item.owner = owner;
  });
  document.getElementById('owner-picker')?.remove();
  selected.clear(); save(); updateNavCounts(); renderBulkBar(); render();
}

// ── Boot ──────────────────────────────────────────────────────────────────────
loadItems();
</script>
