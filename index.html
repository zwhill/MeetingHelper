function trashCard(i) {
  return `<div class="item" style="opacity:0.6">
    <div class="item-body" style="padding-left:0">
      <div class="item-text done">${escHtml(i.text)}</div>
      <div class="item-meta">
        <span class="badge b-other">${escHtml(i.owner)}</span>
        <span class="badge b-meeting">${escHtml(i.meeting.split(/\s+/).slice(0,4).join(' '))}</span>
        <span class="badge b-date">${i.meetingDate ? i.meetingDate.slice(5).replace('-','/') : ''}</span>
        <button data-restore="${i.id}" style="font-size:11px;padding:2px 10px;border-radius:99px;cursor:pointer;background:transparent;color:var(--green);border:1px solid var(--green-border);font-family:var(--font);transition:all 0.15s">Restore</button>
      </div>
    </div>
  </div>`;
}

function openMeetingModal(meetingName) {
  const sk = seriesKey(meetingName);
  const items = allItems.filter(i => i.meeting === meetingName && !trash.has(i.id));
  const openItems = items.filter(i => !done.has(i.id) && !dismissed.has(i.id));
  const doneItems = items.filter(i => done.has(i.id) || dismissed.has(i.id));

  // Find latest summary for this meeting
  const summary = allSummaries.find(s => s.seriesKey === sk) ||
    allSummaries.find(s => s.meetingName === meetingName);

  const briefHtml = summary
    ? `<div class="kmodal-brief">${escHtml(summary.summary)}</div>`
    : `<div class="kmodal-brief empty">No meeting brief available.</div>`;

  function taskRow(i) {
    const isDone = done.has(i.id) || dismissed.has(i.id);
    const isMe = i.owner === ME;
    const dateLabel = i.meetingDate ? i.meetingDate.slice(5).replace('-','/') : '';
    return `<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer" data-modal-item="${i.id}">
      <div style="width:14px;height:14px;margin-top:2px;border-radius:50%;border:2px solid ${isDone?'var(--green)':'var(--border2)'};background:${isDone?'var(--green-bg)':'transparent'};flex-shrink:0"></div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;color:${isDone?'var(--text3)':'var(--text)'};line-height:1.5;${isDone?'text-decoration:line-through':''}">${escHtml(i.text)}</div>
        <div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap">
          <span class="badge ${isMe?'b-me':'b-other'}">${escHtml(i.owner)}</span>
          <span class="badge b-date">${dateLabel}</span>
        </div>
      </div>
    </div>`;
  }

  const overlay = document.createElement('div');
  overlay.className = 'kmodal-overlay';
  overlay.id = 'meeting-modal-overlay';
  overlay.innerHTML = `
    <div class="kmodal" id="meeting-modal" style="width:680px">
      <div class="kmodal-hdr">
        <div class="kmodal-hdr-left">
          <span style="font-size:13px;font-weight:600;color:var(--text)">${escHtml(meetingName)}</span>
        </div>
        <button class="kmodal-close" id="meeting-modal-close">×</button>
      </div>
      ${summary ? `<div class="kmodal-section">
        <div class="kmodal-label">Latest brief · ${summary.meetingDate||''}</div>
        ${briefHtml}
      </div>` : ''}
      <div class="kmodal-section">
        <div class="kmodal-label">${openItems.length} open item${openItems.length!==1?'s':''}</div>
        ${openItems.length ? openItems.map(taskRow).join('') : '<div style="color:var(--text3);font-size:12px;font-style:italic">No open items</div>'}
      </div>
      ${doneItems.length ? `<div class="kmodal-section">
        <div class="kmodal-label">${doneItems.length} completed</div>
        ${doneItems.map(taskRow).join('')}
      </div>` : ''}
      <div class="kmodal-footer">
        <div class="kmodal-footer-left"></div>
        <div class="kmodal-footer-right">
          <button class="kmodal-btn" id="meeting-modal-view">View all items →</button>
        </div>
      </div>
    </div>`;

  document.body.appendChild(overlay);

  overlay.addEventListener('click', e => { if (e.target === overlay) closeMeetingModal(); });
  document.getElementById('meeting-modal-close').addEventListener('click', closeMeetingModal);
  document.getElementById('meeting-modal-view').addEventListener('click', () => {
    closeMeetingModal();
    switchMeeting(meetingName, null);
  });

  // Click a task row to open card modal
  overlay.querySelectorAll('[data-modal-item]').forEach(el => {
    el.addEventListener('click', () => {
      closeMeetingModal();
      openCardModal(el.dataset.modalItem);
    });
  });

  const escFn = e => { if (e.key === 'Escape') { closeMeetingModal(); document.removeEventListener('keydown', escFn); } };
  document.addEventListener('keydown', escFn);
}

function closeMeetingModal() {
  const o = document.getElementById('meeting-modal-overlay');
  if (o) o.remove();
}

function renderMeetings() {
  const main = document.getElementById('main-content');

  // Group by normalized seriesKey — use most common raw name as display name
  const skMap = {}; // sk -> { names: {name: count}, total, open, sk }
  allItems.forEach(i => {
    const sk = seriesKey(i.meeting);
    if (!skMap[sk]) skMap[sk] = { names: {}, total: 0, open: 0, sk };
    skMap[sk].names[i.meeting] = (skMap[sk].names[i.meeting] || 0) + 1;
    skMap[sk].total++;
    if (!done.has(i.id) && !dismissed.has(i.id) && !trash.has(i.id)) skMap[sk].open++;
  });

  // Also include meetings from calendar events (may have no items or summaries yet)
  calEvents.forEach(ev => {
    if (!ev.subject) return;
    const sk = seriesKey(ev.subject);
    if (!skMap[sk]) skMap[sk] = { names: {}, total: 0, open: 0, sk };
    skMap[sk].names[ev.subject] = (skMap[sk].names[ev.subject] || 0) + 1;
  });

  // Also include meetings that only appear in summaries
  allSummaries.forEach(s => {
    const sk = seriesKey(s.seriesKey || s.meetingName || '');
    if (!skMap[sk]) skMap[sk] = { names: {}, total: 0, open: 0, sk };
    const name = s.meetingName || s.seriesKey || '';
    if (name) skMap[sk].names[name] = (skMap[sk].names[name] || 0) + 1;
  });

  // Include muted meetings
  mutedMeetings.forEach(sk => {
    if (!skMap[sk]) skMap[sk] = { names: {}, total: 0, open: 0, sk };
  });

  // Pick canonical name = most frequent raw name
  Object.values(skMap).forEach(m => {
    m.displayName = Object.entries(m.names).sort((a,b) => b[1]-a[1])[0]?.[0] || m.sk;
  });

  const meetings = Object.values(skMap).sort((a,b) => a.displayName.localeCompare(b.displayName));

  const rows = meetings.map(m => {
    const isMuted = mutedMeetings.has(m.sk);
    const safeSk = m.sk.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const safeName = m.displayName.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `<div class="person-row${isMuted?' muted':''}" style="${isMuted?'opacity:0.45':''}">
      <div class="person-info" style="cursor:pointer;flex:1" onclick="openMeetingModal('${safeName}')">
        <div class="avatar" style="background:var(--surface2);color:var(--text2);font-size:12px;font-weight:600">
          ${m.open > 0 ? m.open : '—'}
        </div>
        <div>
          <div class="person-name">${escHtml(m.displayName)}${isMuted?' <span style="color:var(--text3);font-size:11px">(muted)</span>':''}</div>
          <div class="person-count">${m.open} open · ${m.total} total</div>
        </div>
      </div>
      <button class="btn-mute${isMuted?' muted':''}" onclick="toggleMuteMeeting('${safeSk}')">${isMuted?'Unmute':'Mute'}</button>
    </div>`;
  }).join('');

  main.innerHTML = `
    <div class="section-label" style="margin-bottom:12px">${meetings.length} meetings</div>
    <div class="people-list">${rows}</div>`;
}

function renderPeople() {
  const counts = {};
  allItems.forEach(i => { counts[i.owner] = (counts[i.owner]||0)+1; });
  const avatarColors = ['#1a2540','#0a1f18','#1f1010','#1a1400','#1a0f2a','#0a1a25'];
  const textColors = ['#4a9eff','#1D9E75','#E24B4A','#d4820a','#9b6dff','#4adfff'];

  const html = Object.entries(counts)
    .sort((a,b) => a[0].localeCompare(b[0]))
    .map(([owner, count], idx) => {
      const isMuted = muted.has(owner);
      const isMe = owner === ME;
      const initials = owner.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
      const ci = idx % avatarColors.length;
      const openCount = allItems.filter(i => i.owner===owner && !done.has(i.id) && !dismissed.has(i.id)).length;
      return `<div class="person-row${isMuted?' muted':''}">
        <div class="person-info">
          <div class="avatar" style="background:${avatarColors[ci]};color:${textColors[ci]}">${initials}</div>
          <div>
            <div class="person-name">${escHtml(owner)}${isMe?' <span style="color:var(--text3);font-size:11px">(you)</span>':''}</div>
            <div class="person-count">${openCount} open · ${count} total</div>
          </div>
        </div>
        ${isMe
          ? '<span style="font-size:11px;color:var(--text3)">always shown</span>'
          : `<button class="btn-mute${isMuted?' muted':''}" data-owner="${escAttr(owner)}">${isMuted?'Unmute':'Mute'}</button>`}
      </div>`;
    }).join('');

  const allMuted = Object.keys(counts).filter(o => o !== ME).every(o => muted.has(o));
  document.getElementById('main-content').innerHTML = `
    <div style="margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;">
      <span style="font-size:12px;color:var(--text3)">Mute someone to hide their items from all views. Your items always show.</span>
      <button id="btn-mute-all" style="font-size:11px;padding:4px 12px;border-radius:6px;cursor:pointer;font-family:var(--font);transition:all 0.15s;background:${allMuted?'var(--red-bg)':'transparent'};color:${allMuted?'var(--red)':'var(--text3)'};border:1px solid ${allMuted?'var(--red-border)':'var(--border2)'};">
        ${allMuted ? 'Unmute all' : 'Mute all'}
      </button>
    </div>
    <div class="people-grid">${html}</div>`;

  document.querySelectorAll('.btn-mute').forEach(btn => {
    btn.addEventListener('click', () => {
      const o = btn.dataset.owner;
      if (muted.has(o)) muted.delete(o); else muted.add(o);
      save(); buildMeetingNav(); updateNavCounts(); renderPeople();
    });
  });

  document.getElementById('btn-mute-all')?.addEventListener('click', () => {
    const others = Object.keys(counts).filter(o => o !== ME);
    const allMuted = others.every(o => muted.has(o));
    if (allMuted) {
      if (!confirm('Unmute everyone?')) return;
      others.forEach(o => muted.delete(o));
    } else {
      if (!confirm(`Mute all ${others.length} people? Your items will still show.`)) return;
      others.forEach(o => muted.add(o));
    }
    save(); buildMeetingNav(); updateNavCounts(); renderPeople();
  });
}

// ── Utils ─────────────────────────────────────────────────────────────────────

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}


// ── Sidebar resize ────────────────────────────────────────────────────────────
(function() {
  const handle = document.getElementById('resize-handle');
  const sidebar = document.getElementById('sidebar');
  let dragging = false, startX = 0, startW = 0;
  handle.addEventListener('mousedown', e => {
    dragging = true;
    startX = e.clientX;
    startW = sidebar.offsetWidth;
    handle.classList.add('dragging');
    document.body.style.userSelect = 'none';
    document.body.style.cursor = 'col-resize';
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const w = Math.min(400, Math.max(160, startW + (e.clientX - startX)));
    sidebar.style.width = w + 'px';
  });
  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.userSelect = '';
    document.body.style.cursor = '';
  });
})();


// ── Multiselect ───────────────────────────────────────────────────────────────


function toggleMultiselect(force) {
  multiselect = force !== undefined ? force : !multiselect;
  selected.clear();
  renderBulkBar();
  render();
}

function renderBulkBar() {
  document.getElementById('bulk-bar')?.remove();
  document.getElementById('owner-picker')?.remove();
  if (!multiselect || selected.size === 0) return;
  const owners = [...new Set(allItems.map(i => i.owner))].sort();
  const bar = document.createElement('div');
  bar.className = 'bulk-bar'; bar.id = 'bulk-bar';
  bar.innerHTML = `
    <span class="bulk-count">${selected.size} selected</span>
    <button class="bulk-btn success" onclick="bulkDone()">✓ Mark done</button>
    <button class="bulk-btn" onclick="bulkDismiss()">✕ Dismiss</button>
    <button class="bulk-btn" onclick="bulkOwner()">↩ Change owner</button>
    <button class="bulk-btn danger" onclick="bulkDelete()">Delete</button>
  `;
  document.body.appendChild(bar);
}

function bulkDone() {
  selected.forEach(id => { done.add(id); likely.delete(id); dismissed.delete(id); });
  selected.clear(); save(); updateNavCounts(); renderBulkBar(); render();
}

function bulkDismiss() {
  selected.forEach(id => { dismissed.add(id); likely.delete(id); });
  selected.clear(); save(); updateNavCounts(); renderBulkBar(); render();
}

function bulkDelete() {
  selected.forEach(id => { trash.add(id); done.delete(id); dismissed.delete(id); likely.delete(id); });
  selected.clear(); save(); updateNavCounts(); renderBulkBar(); render();
}

function emptyTrash() {
  if (!confirm(`Permanently delete ${trash.size} item${trash.size!==1?'s':''}? This cannot be undone.`)) return;
  allItems = allItems.filter(i => !trash.has(i.id));
  trash.clear(); save(); updateNavCounts(); render();
}

function bulkOwner() {
  document.getElementById('owner-picker')?.remove();
  const owners = [...new Set(allItems.map(i => i.owner))].sort();
  const picker = document.createElement('div');
  picker.className = 'owner-picker'; picker.id = 'owner-picker';
  picker.innerHTML = owners.map(o =>
    `<div class="owner-option" onclick="bulkAssign('${o.replace(/'/g,"\'")}')">${o}</div>`
  ).join('');
  document.body.appendChild(picker);
  setTimeout(() => document.addEventListener('click', function h(e) {
    if (!picker.contains(e.target)) { picker.remove(); document.removeEventListener('click', h); }
  }), 0);
}

function bulkAssign(owner) {
  selected.forEach(id => {
    const item = allItems.find(i => i.id === id);
    if (item) item.owner = owner;
  });
  document.getElementById('owner-picker')?.remove();
  selected.clear(); save(); updateNavCounts(); renderBulkBar(); render();
}

// ── Version poller ────────────────────────────────────────────────────────────
const CURRENT_VERSION = '1.9.3';
async function checkVersion() {
  try {
    const res = await fetch(`/MeetingHelper/version.json?_=${Date.now()}`);
    if (!res.ok) return;
    const { version } = await res.json();
    if (version && version !== CURRENT_VERSION && !document.getElementById('version-banner')) {
      const banner = document.createElement('div');
      banner.id = 'version-banner';
      banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#1a1200;border-bottom:1px solid #4a3800;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;font-size:13px;color:#e8a020;font-family:var(--font)';
      banner.innerHTML = `<span>⬆ New version available (v${version})</span><button onclick="location.reload(true)" style="background:#e8a020;color:#000;border:none;border-radius:5px;padding:5px 14px;cursor:pointer;font-size:12px;font-weight:600">Update now</button>`;
      document.body.prepend(banner);
    }
  } catch(e) {}
}
checkVersion();
setInterval(checkVersion, 60000);

// ── Boot ──────────────────────────────────────────────────────────────────────
loadItems();
</script>
